<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fitlio Dashboard</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', sans-serif; background: #0f0f0f; color: #fff; }
    nav { display: flex; justify-content: space-between; align-items: center;
          padding: 20px 40px; background: #0f0f0f; border-bottom: 1px solid #222; }
    nav .logo { font-size: 24px; font-weight: 700; color: #00e676; }
    nav .user-info { display: flex; align-items: center; gap: 16px; }
    nav .username { color: #aaa; font-size: 14px; }
    .btn-logout { background: transparent; border: 1px solid #444; color: #aaa;
                  padding: 8px 16px; border-radius: 6px; cursor: pointer; font-size: 14px; }
    .btn-logout:hover { border-color: #fff; color: #fff; }
    .container { max-width: 1200px; margin: 0 auto; padding: 40px; }
    .kpi-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 40px; }
    .kpi-card { background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 12px; padding: 24px; }
    .kpi-card .label { color: #888; font-size: 13px; margin-bottom: 8px; }
    .kpi-card .value { font-size: 32px; font-weight: 700; color: #00e676; }
    .section { margin-bottom: 40px; }
    .section h2 { font-size: 20px; margin-bottom: 16px; color: #fff; }
    .membership-card { background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 12px; padding: 24px; }
    .membership-card .plan { font-size: 24px; font-weight: 700; color: #00e676; margin-bottom: 8px; }
    .membership-card .detail { color: #888; font-size: 14px; margin-bottom: 4px; }
    .status-active { color: #00e676; }
    .classes-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; }
    .class-card { background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 12px;
                  padding: 20px; display: flex; justify-content: space-between; align-items: center; }
    .class-info .name { font-size: 16px; font-weight: 600; margin-bottom: 4px; }
    .class-info .meta { color: #888; font-size: 13px; margin-bottom: 2px; }
    .btn-book { background: #00e676; color: #000; border: none; padding: 10px 20px;
                border-radius: 8px; font-weight: 700; cursor: pointer; font-size: 14px; }
    .btn-book:hover { background: #00c853; }
    .payment-table { width: 100%; border-collapse: collapse; }
    .payment-table th { text-align: left; padding: 12px 16px; color: #888;
                        font-size: 13px; border-bottom: 1px solid #2a2a2a; }
    .payment-table td { padding: 12px 16px; font-size: 14px; border-bottom: 1px solid #1a1a1a; }
    .status-completed { color: #00e676; }
    .empty { color: #888; font-size: 14px; padding: 20px 0; }
    .loading { color: #888; font-size: 14px; }
    .btn-subscribe { background: #00e676; color: #000; border: none; padding: 12px 24px;
                     border-radius: 8px; font-weight: 700; cursor: pointer; font-size: 14px; margin-top: 16px; }
    .btn-subscribe:hover { background: #00c853; }
    .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
             background: rgba(0,0,0,0.8); z-index: 1000; justify-content: center; align-items: center; }
    .modal.active { display: flex; }
    .modal-content { background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 16px;
                     padding: 40px; width: 100%; max-width: 440px; }
    .modal-content h2 { margin-bottom: 24px; }
    .modal-content input { width: 100%; padding: 12px 16px; background: #0f0f0f;
                           border: 1px solid #333; border-radius: 8px; color: #fff;
                           font-size: 14px; margin-bottom: 12px; }
    .modal-content input:focus { outline: none; border-color: #00e676; }
    .modal-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .plan-select { display: flex; gap: 12px; margin-bottom: 16px; }
    .btn-plan { flex: 1; padding: 12px; border-radius: 8px; font-weight: 700;
                cursor: pointer; border: 2px solid #333; background: #1a1a1a;
                color: #888; font-size: 14px; }
    .btn-plan.selected { border-color: #00e676; color: #00e676; }
    .modal-actions { display: flex; gap: 12px; margin-top: 8px; }
    .btn-pay { flex: 1; padding: 14px; background: #00e676; color: #000;
               border: none; border-radius: 8px; font-weight: 700; cursor: pointer; font-size: 16px; }
    .btn-pay:hover { background: #00c853; }
    .btn-cancel-modal { flex: 1; padding: 14px; background: transparent;
                        border: 1px solid #444; color: #aaa; border-radius: 8px;
                        font-weight: 700; cursor: pointer; font-size: 16px; }
    .btn-cancel-modal:hover { border-color: #fff; color: #fff; }
  </style>
</head>
<body>

<nav>
  <div class="logo">⚡ Fitlio</div>
  <div class="user-info">
    <span class="username" id="nav-username">Loading...</span>
    <button class="btn-logout" onclick="logout()">Logout</button>
  </div>
</nav>

<div class="container">

  <div class="kpi-grid">
    <div class="kpi-card">
      <div class="label">My Bookings</div>
      <div class="value" id="kpi-bookings">0</div>
    </div>
    <div class="kpi-card">
      <div class="label">Membership</div>
      <div class="value" id="kpi-membership">-</div>
    </div>
    <div class="kpi-card">
      <div class="label">Available Classes</div>
      <div class="value" id="kpi-classes">-</div>
    </div>
  </div>

  <div class="section">
    <h2>💳 Membership</h2>
    <div class="membership-card" id="membership-card">
      <div class="loading">Loading...</div>
    </div>
  </div>

  <div class="section">
    <h2>🏋️ Available Classes</h2>
    <div class="classes-grid" id="classes-grid">
      <div class="loading">Loading classes...</div>
    </div>
  </div>

  <div class="section">
    <h2>💰 Payment History</h2>
    <table class="payment-table">
      <thead>
        <tr>
          <th>Date</th>
          <th>Plan</th>
          <th>Amount</th>
          <th>Status</th>
        </tr>
      </thead>
      <tbody id="payment-history">
        <tr><td colspan="4" class="loading">Loading...</td></tr>
      </tbody>
    </table>
  </div>

</div>

<!-- Payment Modal -->
<div class="modal" id="payment-modal">
  <div class="modal-content">
    <h2>💳 Subscribe to Fitlio</h2>
    <div class="plan-select">
      <button class="btn-plan selected" id="btn-monthly" onclick="selectPlan('monthly')">
        📅 Monthly<br><small>$50 AUD/mo</small>
      </button>
      <button class="btn-plan" id="btn-yearly" onclick="selectPlan('yearly')">
        📆 Yearly<br><small>$500 AUD/yr</small>
      </button>
    </div>
    <input type="text" id="card-name" placeholder="Cardholder Name">
    <input type="text" id="card-number" placeholder="Card Number" maxlength="19" oninput="formatCard(this)">
    <div class="modal-row">
      <input type="text" id="card-expiry" placeholder="MM/YY" maxlength="5" oninput="formatExpiry(this)">
      <input type="text" id="card-cvv" placeholder="CVV" maxlength="3">
    </div>
    <div class="modal-actions">
      <button class="btn-cancel-modal" onclick="closeModal()">Cancel</button>
      <button class="btn-pay" onclick="processPayment()">Pay Now</button>
    </div>
  </div>
</div>

<script>
  const API = 'http://fitlio-jay.duckdns.org';
  const token = localStorage.getItem('fitlio_token');
  const memberId = localStorage.getItem('fitlio_member_id');
  const username = localStorage.getItem('fitlio_username');

  if (!token || !memberId) {
    window.location.href = '/';
  }

  document.getElementById('nav-username').textContent = '👋 ' + (username || 'Member');

  let selectedPlan = 'monthly';

  function selectPlan(plan) {
    selectedPlan = plan;
    document.getElementById('btn-monthly').classList.toggle('selected', plan === 'monthly');
    document.getElementById('btn-yearly').classList.toggle('selected', plan === 'yearly');
  }

  function formatCard(input) {
    let val = input.value.replace(/\D/g, '').substring(0, 16);
    input.value = val.replace(/(.{4})/g, '$1 ').trim();
  }

  function formatExpiry(input) {
    let val = input.value.replace(/\D/g, '').substring(0, 4);
    if (val.length >= 2) val = val.substring(0, 2) + '/' + val.substring(2);
    input.value = val;
  }

  function openModal() {
    document.getElementById('payment-modal').classList.add('active');
  }

  function closeModal() {
    document.getElementById('payment-modal').classList.remove('active');
  }

  function logout() {
    localStorage.removeItem('fitlio_token');
    localStorage.removeItem('fitlio_member_id');
    localStorage.removeItem('fitlio_username');
    window.location.href = '/';
  }

  async function loadMembership() {
    try {
      const res = await fetch(API + '/payments/membership/' + memberId);
      const data = await res.json();
      if (res.ok) {
        document.getElementById('kpi-membership').textContent = '✅ Active';
        document.getElementById('membership-card').innerHTML =
          '<div class="plan">' + (data.plan === 'monthly' ? '📅 Monthly Plan' : '📆 Yearly Plan') + '</div>' +
          '<div class="detail">Status: <span class="status-active">Active ✅</span></div>' +
          '<div class="detail">Expires: ' + new Date(data.end_date).toLocaleDateString() + '</div>' +
          '<div class="detail">Auto Renew: ' + (data.auto_renew ? '✅ On' : '❌ Off') + '</div>';
      } else {
        document.getElementById('kpi-membership').textContent = '❌ None';
        document.getElementById('membership-card').innerHTML =
          '<div class="detail" style="color:#888;margin-bottom:16px">No active membership.</div>' +
          '<button class="btn-subscribe" onclick="openModal()">Subscribe Now</button>';
      }
    } catch (e) {
      document.getElementById('membership-card').innerHTML = '<div class="empty">Failed to load</div>';
    }
  }

  async function processPayment() {
    const cardName = document.getElementById('card-name').value;
    const cardNumber = document.getElementById('card-number').value;
    const cardExpiry = document.getElementById('card-expiry').value;
    const cardCvv = document.getElementById('card-cvv').value;
    if (!cardName || !cardNumber || !cardExpiry || !cardCvv) {
      alert('Please fill in all card details');
      return;
    }
    try {
      const res = await fetch(API + '/payments/membership?member_id=' + memberId, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ plan: selectedPlan })
      });
      const data = await res.json();
      if (res.ok) {
        closeModal();
        alert('Membership activated! Amount: $' + data.payment.amount + ' AUD');
        loadMembership();
        loadPaymentHistory();
      } else {
        alert('Payment failed');
      }
    } catch (e) {
      alert('Cannot connect to server');
    }
  }

  async function loadClasses() {
    try {
      const res = await fetch(API + '/classes');
      const data = await res.json();
      document.getElementById('kpi-classes').textContent = data.length || 0;
      if (!data.length) {
        document.getElementById('classes-grid').innerHTML = '<div class="empty">No classes available</div>';
        return;
      }
      document.getElementById('classes-grid').innerHTML = data.map(function(c) {
        return '<div class="class-card">' +
          '<div class="class-info">' +
          '<div class="name">' + c.name + '</div>' +
          '<div class="meta">👤 ' + c.instructor + '</div>' +
          '<div class="meta">🕐 ' + new Date(c.schedule).toLocaleString() + '</div>' +
          '<div class="meta">👥 ' + c.current_count + '/' + c.capacity + ' spots</div>' +
          '</div>' +
          '<button class="btn-book" onclick="bookClass(' + c.id + ')">Book</button>' +
          '</div>';
      }).join('');
    } catch (e) {
      document.getElementById('classes-grid').innerHTML = '<div class="empty">Failed to load classes</div>';
    }
  }

  async function bookClass(classId) {
    try {
      const res = await fetch(API + '/classes/' + classId + '/book', {
        method: 'POST',
        headers: { 'Authorization': 'Bearer ' + token }
      });
      const data = await res.json();
      if (res.ok) {
        alert('Class booked!');
        loadClasses();
        document.getElementById('kpi-bookings').textContent =
          parseInt(document.getElementById('kpi-bookings').textContent) + 1;
      } else {
        alert(data.detail);
      }
    } catch (e) {
      alert('Cannot connect to server');
    }
  }

  async function loadPaymentHistory() {
    try {
      const res = await fetch(API + '/payments/history/' + memberId);
      const data = await res.json();
      if (!data.length) {
        document.getElementById('payment-history').innerHTML =
          '<tr><td colspan="4" class="empty">No payment history</td></tr>';
        return;
      }
      document.getElementById('payment-history').innerHTML = data.map(function(p) {
        return '<tr>' +
          '<td>' + new Date(p.created_at).toLocaleDateString() + '</td>' +
          '<td>' + (p.plan || '-') + '</td>' +
          '<td>$' + p.amount + ' AUD</td>' +
          '<td class="status-' + p.status + '">' + p.status + '</td>' +
          '</tr>';
      }).join('');
    } catch (e) {
      document.getElementById('payment-history').innerHTML =
        '<tr><td colspan="4" class="empty">Failed to load</td></tr>';
    }
  }

  loadMembership();
  loadClasses();
  loadPaymentHistory();
</script>

</body>
</html>
