# Copy to promtail-secret.yaml (DO NOT COMMIT real values) and apply, or use:
#   kubectl -n monitoring create secret generic promtail-token --from-literal=token='YOUR_GRAFANA_LOKI_TOKEN'
#
# The Secret key MUST be `token` (matches promtail-daemonset volume subPath).
apiVersion: v1
kind: Secret
metadata:
  name: promtail-token
  namespace: monitoring
type: Opaque
stringData:
  token: "REPLACE_WITH_GRAFANA_CLOUD_LOKI_API_TOKEN"
