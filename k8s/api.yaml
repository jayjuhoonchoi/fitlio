apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: fitlio
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      containers:
      - name: api
        image: jayjuhoonchoi/fitlio:latest
        env:
        - name: DATABASE_URL
          value: "postgresql://fitlio:fitlio123@db:5432/fitlio"
        ports:
        - containerPort: 8000
        readinessProbe:
          httpGet:
            path: /docs
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: api
  namespace: fitlio
spec:
  selector:
    app: api
  ports:
  - port: 8000
    targetPort: 8000
