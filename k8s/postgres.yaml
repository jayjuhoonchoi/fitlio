apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: fitlio
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
      - name: postgres
        image: postgres:15
        env:
        - name: POSTGRES_USER
          valueFrom:
            secretKeyRef:
              name: fitlio-env
              key: POSTGRES_USER
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: fitlio-env
              key: POSTGRES_PASSWORD
        - name: POSTGRES_DB
          valueFrom:
            secretKeyRef:
              name: fitlio-env
              key: POSTGRES_DB
        ports:
        - containerPort: 5432
        resources:
          requests:
            memory: "256Mi"    # postgres는 api보다 메모리 더 필요
            cpu: "100m"
          limits:
            memory: "512Mi"    # t4g.small 2GB 중 절반은 postgres에
            cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: db
  namespace: fitlio
spec:
  selector:
    app: postgres
  ports:
  - port: 5432
    targetPort: 5432
