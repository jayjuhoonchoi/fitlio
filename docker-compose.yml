version: '3.8'
services:
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://fitlio:fitlio123@db:5432/fitlio
    depends_on:
      - db

  db:
    image: postgres:15
    environment:
      - POSTGRES_USER=fitlio
      - POSTGRES_PASSWORD=fitlio123
      - POSTGRES_DB=fitlio
    volumes:
      - postgres_data:/var/lib/postgresql/data

  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=fitlio123
    depends_on:
      - prometheus
    node-exporter:
    image: prom/node-exporter:latest
    ports:
      - "9100:9100"  

volumes:
  postgres_data: