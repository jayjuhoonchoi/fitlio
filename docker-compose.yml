# DB credentials are fixed here so the stack starts without a .env file.
# To use your own password, edit below or use docker-compose.override.yml.
services:
  nginx:
    image: nginx:latest
    environment:
      FITLIO_DOMAIN: fitlio-jay.duckdns.org
    # Host 80/443 are often taken by Kubernetes (k3s) on the same node; map to high ports.
    # Open these in the EC2 security group. Site URL: http://<host>:8080  https://<host>:8443
    ports:
      - "8080:80"
      - "8443:443"
    volumes:
      - ./nginx/default.http.conf:/etc/nginx/templates/default.http.conf:ro
      - ./nginx/default.https.conf:/etc/nginx/templates/default.https.conf:ro
      - ./nginx/entrypoint/40-fitlio-ssl-auto.sh:/docker-entrypoint.d/40-fitlio-ssl-auto.sh:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/www/certbot:/var/www/certbot
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

  api:
    build: .
    ports:
      - "0.0.0.0:8000:8000"
    environment:
      DATABASE_URL: postgresql://fitlio:fitlio123@db:5432/fitlio
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test:
        ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')"]
      interval: 5s
      timeout: 5s
      retries: 18
      start_period: 25s

  db:
    image: postgres:15
    environment:
      POSTGRES_USER: fitlio
      POSTGRES_PASSWORD: fitlio123
      POSTGRES_DB: fitlio
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fitlio -d fitlio"]
      interval: 3s
      timeout: 5s
      retries: 20
      start_period: 10s

  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
    depends_on:
      - prometheus
    restart: unless-stopped

  node-exporter:
    image: prom/node-exporter:latest
    ports:
      - "9100:9100"
    restart: unless-stopped

volumes:
  postgres_data:
