version: '3.8'

services:
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://fitlio:fitlio123@db:5432/fitlio
    depends_on:
      - db

  db:
    image: postgres:15
    environment:
      - POSTGRES_USER=fitlio
      - POSTGRES_PASSWORD=fitlio123
      - POSTGRES_DB=fitlio
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
