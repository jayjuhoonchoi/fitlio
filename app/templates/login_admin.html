<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fitlio — Admin</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #1a0f14; color: #fce7f3; min-height: 100vh; padding: 1.5rem; }
    .wrap { max-width: 400px; margin: 0 auto; }
    h1 { font-size: 1.35rem; margin-bottom: .25rem; color: #fda4af; }
    .sub { color: #9ca3af; font-size: .9rem; margin-bottom: 1.25rem; }
    label { display: block; font-size: .72rem; text-transform: uppercase; color: #9ca3af; margin: .5rem 0 .25rem; }
    input { width: 100%; padding: .65rem .75rem; border-radius: 10px; border: 1px solid #4c1d30; background: #2a1219; color: #fff; }
    .btn { width: 100%; margin-top: 1rem; padding: .7rem; border: none; border-radius: 10px; font-weight: 600; cursor: pointer; background: linear-gradient(135deg,#fb7185,#f43f5e); color: #fff; }
    .msg { margin-top: .75rem; padding: .5rem .65rem; border-radius: 8px; font-size: .85rem; display: none; }
    .msg.err { display: block; background: rgba(0,0,0,.35); color: #fecaca; border: 1px solid #7f1d1d; }
    .top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; }
    a { color: #fda4af; font-size: .85rem; }
    .lang { display: flex; gap: .35rem; }
    .lang button { font-size: .75rem; padding: .2rem .5rem; border-radius: 6px; border: 1px solid #4c1d30; background: transparent; color: #e7e5e4; cursor: pointer; }
    .lang button.on { border-color: #fb7185; color: #fda4af; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="top">
      <a href="/" data-i18n="back">← Home</a>
      <div class="lang"><button type="button" id="ko">KO</button><button type="button" id="en">EN</button></div>
    </div>
    <h1 data-i18n="h1">Admin sign in</h1>
    <p class="sub" data-i18n="sub">Staff dashboard access only.</p>
    <label data-i18n="em">Email</label>
    <input type="email" id="email" autocomplete="username">
    <label data-i18n="pw">Password</label>
    <input type="password" id="password" autocomplete="current-password">
    <button class="btn" type="button" id="go" data-i18n="go">Sign in</button>
    <div id="msg" class="msg"></div>
  </div>
  <script>
    const S = {
      en: { back:"← Home", h1:"Admin sign in", sub:"Staff dashboard access only.", em:"Email", pw:"Password", go:"Sign in", bad:"Not an admin account. Use member login.", need:"Enter email and password." },
      ko: { back:"← 처음", h1:"관리자 로그인", sub:"직원·대시보드 전용입니다.", em:"이메일", pw:"비밀번호", go:"로그인", bad:"관리자 계정이 아닙니다. 회원 로그인을 이용하세요.", need:"이메일과 비밀번호를 입력하세요." }
    };
    let lang = localStorage.getItem("fitlio_lang")||"ko";
    function t(k){ return (S[lang]&&S[lang][k])||k; }
    function apply(){ document.querySelectorAll("[data-i18n]").forEach(el=>{const k=el.getAttribute("data-i18n");el.textContent=t(k);}); document.getElementById("ko").classList.toggle("on",lang==="ko"); document.getElementById("en").classList.toggle("on",lang==="en"); }
    document.getElementById("ko").onclick=()=>{lang="ko";localStorage.setItem("fitlio_lang",lang);apply();};
    document.getElementById("en").onclick=()=>{lang="en";localStorage.setItem("fitlio_lang",lang);apply();};
    apply();
    function show(text){ const m=document.getElementById("msg"); m.className="msg err"; m.textContent=text; m.style.display="block"; }
    document.getElementById("go").onclick=async()=>{
      const email=document.getElementById("email").value.trim(), password=document.getElementById("password").value;
      if(!email||!password){ show(t("need")); return; }
      const res=await fetch("/auth/login",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({email,password})});
      const data=await res.json().catch(()=>({}));
      if(!res.ok){ show(typeof data.detail==="string"?data.detail:"Login failed"); return; }
      if(data.role!=="admin"){ show(t("bad")); return; }
      localStorage.setItem("token",data.access_token); localStorage.setItem("member_id",String(data.member_id)); localStorage.setItem("user_role","admin");
      location.href="/app/admin";
    };
  </script>
</body>
</html>
