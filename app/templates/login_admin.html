<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fitlio — Admin</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Inter, system-ui, sans-serif; background: #f5f3ea; color: #2f3b32; min-height: 100vh; padding: 1.5rem; }
    .wrap { max-width: 420px; margin: 0 auto; background: #fffdf7; border: 1px solid #d4ddd4; border-radius: 14px; padding: 1.1rem; }
    h1 { font-size: 1.35rem; margin-bottom: .25rem; color: #24503c; }
    .sub { color: #627267; font-size: .9rem; margin-bottom: 1.25rem; }
    label { display: block; font-size: .72rem; text-transform: uppercase; color: #627267; margin: .5rem 0 .25rem; }
    input { width: 100%; padding: .65rem .75rem; border-radius: 10px; border: 1px solid #bcc8bc; background: #fffdf7; color: #2f3b32; }
    .btn { width: 100%; margin-top: 1rem; padding: .7rem; border: none; border-radius: 10px; font-weight: 600; cursor: pointer; background: linear-gradient(135deg,#2f855a,#3d9b6d); color: #f3f8f2; }
    .btn:disabled { opacity: .55; cursor: wait; }
    .msg { margin-top: .75rem; padding: .5rem .65rem; border-radius: 8px; font-size: .85rem; display: none; }
    .msg.err { display: block; background: rgba(0,0,0,.35); color: #fecaca; border: 1px solid #7f1d1d; }
    .top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; }
    a { color: #2f855a; font-size: .85rem; }
    .lang { display: flex; gap: .35rem; }
    .lang button { font-size: .75rem; padding: .2rem .5rem; border-radius: 6px; border: 1px solid #b5c1b8; background: #f4f0e7; color: #4a5c52; cursor: pointer; }
    .lang button.on { border-color: #2f855a; color: #2f855a; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="top">
      <a href="/"><span data-i18n="back">← Home</span></a>
      <div class="lang"><button type="button" id="ko">KO</button><button type="button" id="en">EN</button></div>
    </div>
    <h1><span data-i18n="h1">Admin sign in</span></h1>
    <p class="sub"><span data-i18n="sub">Staff dashboard access only.</span></p>
    <label><span data-i18n="em">Email</span></label>
    <input type="email" id="email" autocomplete="username">
    <label><span data-i18n="pw">Password</span></label>
    <input type="password" id="password" autocomplete="current-password">
    <button class="btn" type="button" id="go"><span data-i18n="go">Sign in</span></button>
    <div id="msg" class="msg"></div>
  </div>
  <script>
    const S = {
      en: { back:"← Home", h1:"Admin sign in", sub:"Staff dashboard access only.", em:"Email", pw:"Password", go:"Sign in", bad:"Not an admin account. Use member login.", need:"Enter email and password.", net:"Cannot reach server.", fail:"Login failed.", working:"…" },
      ko: { back:"← 처음", h1:"관리자 로그인", sub:"직원·대시보드 전용입니다.", em:"이메일", pw:"비밀번호", go:"로그인", bad:"관리자 계정이 아닙니다. 회원 로그인을 이용하세요.", need:"이메일과 비밀번호를 입력하세요.", net:"서버에 연결할 수 없습니다.", fail:"로그인 실패.", working:"처리 중…" }
    };
    let lang = localStorage.getItem("fitlio_lang")||"ko";
    function t(k){ return (S[lang]&&S[lang][k])||k; }
    function apply(){
      document.querySelectorAll("[data-i18n]").forEach(el=>{ const k=el.getAttribute("data-i18n"); el.textContent=t(k); });
      document.getElementById("ko").classList.toggle("on",lang==="ko");
      document.getElementById("en").classList.toggle("on",lang==="en");
    }
    function show(text){ const m=document.getElementById("msg"); m.className="msg err"; m.textContent=text; m.style.display="block"; }
    function errDetail(data){
      if(!data||data.detail==null) return t("fail");
      const d=data.detail;
      if(typeof d==="string") return d;
      if(Array.isArray(d)) return d.map(e=>(e&&e.msg)||"").filter(Boolean).join(" ")||t("fail");
      return t("fail");
    }
    document.getElementById("ko").onclick=()=>{ lang="ko"; localStorage.setItem("fitlio_lang",lang); apply(); };
    document.getElementById("en").onclick=()=>{ lang="en"; localStorage.setItem("fitlio_lang",lang); apply(); };
    document.getElementById("go").onclick=async()=>{
      const email=document.getElementById("email").value.trim(), password=document.getElementById("password").value;
      const goBtn=document.getElementById("go");
      if(!email||!password){ show(t("need")); return; }
      goBtn.disabled=true;
      const lab=goBtn.querySelector('[data-i18n="go"]'); if(lab) lab.textContent=t("working");
      try {
        const res=await fetch("/auth/login",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({email,password})});
        const data=await res.json().catch(()=>({}));
        if(!res.ok){ show(errDetail(data)); return; }
        if(!data.access_token){ show(t("fail")); return; }
        if(data.role!=="admin"){ show(t("bad")); return; }
        localStorage.setItem("token",data.access_token);
        localStorage.setItem("member_id",String(data.member_id));
        localStorage.setItem("user_role","admin");
        location.href="/app/admin";
      } catch(e) {
        show(t("net"));
      } finally {
        goBtn.disabled=false;
        apply();
      }
    };
    apply();
  </script>
</body>
</html>
