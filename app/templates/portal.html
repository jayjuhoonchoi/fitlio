
<!DOCTYPE html>
<html lang="en">
<head>
  <!-- fitlio-portal-v2 -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fitlio</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --font-sans: Inter, "SF Pro Text", "Segoe UI", Roboto, "Noto Sans KR", "Apple SD Gothic Neo", "Malgun Gothic", -apple-system, system-ui, sans-serif;
      --bg: #f4f2e9;
      --panel: #fffdf8;
      --line: #d2dbd1;
      --line-strong: #b6c8ba;
      --text: #223127;
      --muted: #5f7164;
      --heading: #1d4a36;
      --accent: #2f855a;
      --accent-2: #3f9b6b;
      --radius-sm: 10px;
      --radius-md: 14px;
      --radius-lg: 20px;
      --shadow-soft: 0 14px 30px rgba(30, 50, 39, 0.1);
      --shadow-card: 0 10px 20px rgba(35, 56, 44, 0.1);
    }
    body {
      font-family: var(--font-sans);
      font-size: 15px;
      line-height: 1.55;
      letter-spacing: 0.005em;
      min-height: 100vh;
      background:
        radial-gradient(circle at 16% 10%, rgba(73, 123, 97, 0.1), transparent 34%),
        radial-gradient(circle at 88% 0%, rgba(103, 126, 158, 0.12), transparent 28%),
        var(--bg);
      color: var(--text);
      display: grid;
      place-items: center;
      padding: 24px;
    }
    .box {
      max-width: 600px;
      width: 100%;
      background: linear-gradient(165deg, #fffefb, var(--panel));
      border: 1px solid var(--line);
      border-radius: var(--radius-lg);
      padding: 28px;
      box-shadow: var(--shadow-soft);
    }
    h1 {
      font-size: 1.9rem;
      line-height: 1.2;
      letter-spacing: -0.01em;
      font-weight: 710;
      margin-bottom: 8px;
      color: var(--heading);
    }
    p {
      color: var(--muted);
      margin-bottom: 24px;
      line-height: 1.6;
      max-width: 42ch;
      font-size: 0.94rem;
    }
    .row {
      display: grid;
      gap: 12px;
      grid-template-columns: 1fr;
    }
    @media (min-width: 560px) {
      .row { grid-template-columns: 1fr 1fr; }
    }
    a.card {
      display: block;
      padding: 18px;
      border-radius: var(--radius-md);
      text-decoration: none;
      color: inherit;
      background: linear-gradient(155deg, #f5f9f2, #edf4e8);
      border: 1px solid #c6d5c8;
      box-shadow: var(--shadow-card);
      transition: transform 0.16s ease, border-color 0.16s ease, box-shadow 0.16s ease;
    }
    a.card:hover {
      transform: translateY(-2px);
      border-color: var(--accent);
      box-shadow: 0 14px 24px rgba(35, 56, 44, 0.14);
    }
    a.card strong {
      display: block;
      font-size: 1.05rem;
      line-height: 1.3;
      font-weight: 670;
      margin-bottom: 6px;
      color: #244f3b;
    }
    a.card span {
      font-size: 0.84rem;
      line-height: 1.5;
      color: var(--muted);
    }
    .lang {
      margin-top: 20px;
      display: flex;
      gap: 8px;
      justify-content: center;
    }
    .lang button {
      background: #f3f0e7;
      border: 1px solid #b9c4bb;
      color: #405247;
      font-size: 0.76rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      padding: 6px 12px;
      border-radius: 999px;
      cursor: pointer;
      transition: border-color 0.15s ease, color 0.15s ease;
    }
    .lang button.active {
      border-color: var(--accent);
      color: var(--accent);
      box-shadow: 0 0 0 2px rgba(47, 133, 90, 0.14);
    }
    @media (max-width: 560px) {
      body { padding: 16px; }
      .box { padding: 18px; }
      h1 { font-size: 1.62rem; }
      p { margin-bottom: 16px; }
    }
  </style>
</head>
<body>
  <div class="box">
    <h1 data-i18n="title">Fitlio</h1>
    <p data-i18n="sub">Choose how you want to sign in.</p>
    <div class="row">
      <a class="card" href="/login/member"><strong data-i18n="m1">Member</strong><span data-i18n="m2">Book classes, pay, see passes</span></a>
      <a class="card" href="/admin-login"><strong data-i18n="a1">Admin</strong><span data-i18n="a2">Dashboard, sales, staff, alerts</span></a>
    </div>
    <div class="lang">
      <button type="button" id="Lko">한국어</button>
      <button type="button" id="Len">English</button>
    </div>
  </div>
  <script>
    const S = {
      en: { title: "Fitlio", sub: "Choose how you want to sign in.", m1: "Member", m2: "Book classes, pay, see passes", a1: "Admin", a2: "Dashboard, sales, staff, alerts" },
      ko: { title: "핏리오", sub: "로그인 유형을 선택하세요.", m1: "회원", m2: "수업 예약, 결제, 이용권 확인", a1: "관리자", a2: "대시보드, 매출, 강사, 알림" }
    };
    let lang = localStorage.getItem("fitlio_lang") || "ko";
    function apply() {
      const t = S[lang];
      document.querySelectorAll("[data-i18n]").forEach(el => { const k = el.getAttribute("data-i18n"); if (t[k]) el.textContent = t[k]; });
      document.getElementById("Lko").classList.toggle("active", lang === "ko");
      document.getElementById("Len").classList.toggle("active", lang === "en");
    }
    document.getElementById("Lko").onclick = () => { lang = "ko"; localStorage.setItem("fitlio_lang", lang); apply(); };
    document.getElementById("Len").onclick = () => { lang = "en"; localStorage.setItem("fitlio_lang", lang); apply(); };
    apply();
  </script>
</body>
</html>
