<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fitlio — Member</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; padding: 1.5rem; }
    .wrap { max-width: 400px; margin: 0 auto; }
    h1 { font-size: 1.35rem; margin-bottom: .25rem; }
    .sub { color: #94a3b8; font-size: .9rem; margin-bottom: 1.25rem; }
    label { display: block; font-size: .72rem; text-transform: uppercase; color: #94a3b8; margin: .5rem 0 .25rem; }
    input { width: 100%; padding: .65rem .75rem; border-radius: 10px; border: 1px solid #334155; background: #1e293b; color: #fff; }
    .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: .5rem; }
    .btn { width: 100%; margin-top: 1rem; padding: .7rem; border: none; border-radius: 10px; font-weight: 600; cursor: pointer; background: linear-gradient(135deg,#34d399,#2dd4bf); color: #042f2e; }
    .btn2 { margin-top: .5rem; background: transparent; color: #cbd5e1; border: 1px solid #475569; }
    .msg { margin-top: .75rem; padding: .5rem .65rem; border-radius: 8px; font-size: .85rem; display: none; }
    .msg.err { display: block; background: rgba(248,113,113,.15); color: #fecaca; border: 1px solid rgba(248,113,113,.35); }
    .msg.ok { display: block; background: rgba(52,211,153,.12); color: #a7f3d0; border: 1px solid rgba(52,211,153,.35); }
    .top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; }
    a { color: #5eead4; font-size: .85rem; }
    .lang { display: flex; gap: .35rem; }
    .lang button { font-size: .75rem; padding: .2rem .5rem; border-radius: 6px; border: 1px solid #475569; background: transparent; color: #cbd5e1; cursor: pointer; }
    .lang button.on { border-color: #34d399; color: #34d399; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="top">
      <a href="/" data-i18n="back">← Home</a>
      <div class="lang"><button type="button" id="ko">KO</button><button type="button" id="en">EN</button></div>
    </div>
    <h1 data-i18n="h1">Member sign in</h1>
    <p class="sub" data-i18n="sub">Use your member account (not admin).</p>
    <label data-i18n="em">Email</label>
    <input type="email" id="email" autocomplete="username">
    <label data-i18n="pw">Password</label>
    <input type="password" id="password" autocomplete="current-password">
    <label data-i18n="fn">Full name (register)</label>
    <input type="text" id="full_name">
    <div class="row2">
      <div><label data-i18n="cc">Country</label><select id="country_code"></select></div>
      <div><label data-i18n="ph">Phone digits</label><input type="tel" id="phone" inputmode="numeric"></div>
    </div>
    <button class="btn" type="button" id="go" data-i18n="go">Sign in</button>
    <button class="btn btn2" type="button" id="reg" data-i18n="reg">Create account</button>
    <div id="msg" class="msg"></div>
  </div>
  <script>
    const CC = { AU:"+61",KR:"+82",US:"+1",JP:"+81",GB:"+44",DE:"+49" };
    const sel = document.getElementById("country_code");
    Object.keys(CC).forEach(c => { const o=document.createElement("option"); o.value=c; o.textContent=c; if(c==="KR")o.selected=true; sel.appendChild(o); });
    const S = {
      en: { back:"← Home", h1:"Member sign in", sub:"Use your member account (not admin).", em:"Email", pw:"Password", fn:"Full name (register)", cc:"Country", ph:"Phone digits", go:"Sign in", reg:"Create account", badAdmin:"This account is admin. Use the admin login page.", need:"Enter email and password." },
      ko: { back:"← 처음", h1:"회원 로그인", sub:"일반 회원 계정으로 로그인하세요.", em:"이메일", pw:"비밀번호", fn:"이름 (가입 시)", cc:"국가", ph:"전화(숫자)", go:"로그인", reg:"회원가입", badAdmin:"관리자 계정입니다. 관리자 로그인 페이지를 이용하세요.", need:"이메일과 비밀번호를 입력하세요." }
    };
    let lang = localStorage.getItem("fitlio_lang")||"ko";
    function t(k){ return (S[lang]&&S[lang][k])||k; }
    function apply(){ document.querySelectorAll("[data-i18n]").forEach(el=>{const k=el.getAttribute("data-i18n");el.textContent=t(k);}); document.getElementById("ko").classList.toggle("on",lang==="ko"); document.getElementById("en").classList.toggle("on",lang==="en"); }
    document.getElementById("ko").onclick=()=>{lang="ko";localStorage.setItem("fitlio_lang",lang);apply();};
    document.getElementById("en").onclick=()=>{lang="en";localStorage.setItem("fitlio_lang",lang);apply();};
    apply();
    function show(ok, text){ const m=document.getElementById("msg"); m.className="msg "+(ok?"ok":"err"); m.textContent=text; m.style.display="block"; }
    document.getElementById("go").onclick=async()=>{
      const email=document.getElementById("email").value.trim(), password=document.getElementById("password").value;
      if(!email||!password){ show(false,t("need")); return; }
      const res=await fetch("/auth/login",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({email,password})});
      const data=await res.json().catch(()=>({}));
      if(!res.ok){ show(false, typeof data.detail==="string"?data.detail:"Login failed"); return; }
      if(data.role==="admin"){ show(false,t("badAdmin")); return; }
      localStorage.setItem("token",data.access_token); localStorage.setItem("member_id",String(data.member_id)); localStorage.setItem("user_role",data.role||"member");
      location.href="/app/member";
    };
    document.getElementById("reg").onclick=async()=>{
      const body={ email:document.getElementById("email").value.trim(), password:document.getElementById("password").value,
        full_name:document.getElementById("full_name").value.trim()||"Member", phone:document.getElementById("phone").value.trim()||"01000000000", country_code:document.getElementById("country_code").value };
      const res=await fetch("/auth/register",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(body)});
      const data=await res.json().catch(()=>({}));
      show(res.ok, res.ok?(data.message||"OK"):(typeof data.detail==="string"?data.detail:"Failed"));
    };
  </script>
</body>
</html>
