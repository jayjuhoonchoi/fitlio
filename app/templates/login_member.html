<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fitlio — Member</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --font-sans: Inter, "SF Pro Text", "Segoe UI", Roboto, "Noto Sans KR", "Apple SD Gothic Neo", "Malgun Gothic", -apple-system, system-ui, sans-serif;
      --bg: #f4f2e9;
      --panel: #fffdf8;
      --line: #d2dbd1;
      --line-strong: #b6c8ba;
      --text: #223127;
      --muted: #5f7164;
      --heading: #1d4a36;
      --accent: #2f855a;
      --accent-2: #3f9b6b;
      --focus-ring: 0 0 0 3px rgba(47, 133, 90, 0.18);
      --radius-sm: 10px;
      --radius-md: 14px;
      --radius-lg: 18px;
      --shadow-soft: 0 14px 30px rgba(30, 50, 39, 0.1);
    }
    body {
      font-family: var(--font-sans);
      font-size: 15px;
      line-height: 1.55;
      letter-spacing: 0.005em;
      background:
        radial-gradient(circle at 16% 10%, rgba(73, 123, 97, 0.1), transparent 34%),
        radial-gradient(circle at 88% 0%, rgba(103, 126, 158, 0.12), transparent 28%),
        var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 24px;
      display: grid;
      place-items: center;
    }
    .wrap {
      width: 100%;
      max-width: 444px;
      margin: 0 auto;
      background: linear-gradient(165deg, #fffefb, var(--panel));
      border: 1px solid var(--line);
      border-radius: var(--radius-lg);
      padding: 24px;
      box-shadow: var(--shadow-soft);
    }
    h1 {
      font-size: 1.52rem;
      line-height: 1.25;
      letter-spacing: -0.01em;
      font-weight: 700;
      margin-bottom: 6px;
      color: var(--heading);
    }
    .sub {
      color: var(--muted);
      font-size: 0.92rem;
      line-height: 1.55;
      margin-bottom: 20px;
      max-width: 35ch;
    }
    label {
      display: block;
      font-size: 0.71rem;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      font-weight: 620;
      color: #5f7064;
      margin: 12px 0 6px;
    }
    input,
    select {
      width: 100%;
      padding: 10px 12px;
      border-radius: var(--radius-sm);
      border: 1px solid #b8c5bc;
      background: #fffdf8;
      color: var(--text);
      font-family: inherit;
      font-size: 0.92rem;
      line-height: 1.4;
      transition: border-color 0.14s ease, box-shadow 0.14s ease, transform 0.14s ease;
    }
    input:focus,
    select:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: var(--focus-ring);
      transform: translateY(-1px);
    }
    .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .btn {
      width: 100%;
      margin-top: 16px;
      padding: 11px;
      border: 1px solid rgba(47, 133, 90, 0.48);
      border-radius: var(--radius-sm);
      font-size: 0.9rem;
      line-height: 1.25;
      font-weight: 650;
      letter-spacing: 0.01em;
      cursor: pointer;
      background: linear-gradient(140deg, var(--accent), var(--accent-2));
      color: #f2f7f3;
      box-shadow: 0 8px 14px rgba(47, 133, 90, 0.21);
      transition: transform 0.14s ease, box-shadow 0.14s ease, filter 0.14s ease;
    }
    .btn:hover { transform: translateY(-1px); box-shadow: 0 12px 18px rgba(47, 133, 90, 0.26); }
    .btn:disabled { opacity: 0.55; cursor: wait; }
    .btn2 {
      margin-top: 8px;
      background: linear-gradient(160deg, #f8f6ef, #ece8dd);
      color: #34473b;
      border: 1px solid #bcc8bd;
      box-shadow: 0 6px 10px rgba(40, 58, 46, 0.1);
    }
    .msg {
      margin-top: 12px;
      padding: 8px 10px;
      border-radius: 9px;
      font-size: 0.84rem;
      line-height: 1.45;
      display: none;
    }
    .msg.err { display: block; background: #fff2f4; color: #9f1239; border: 1px solid #efb0c1; }
    .msg.ok { display: block; background: #ebf8ef; color: #166534; border: 1px solid #a7d7b7; }
    .top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 14px;
      gap: 8px;
    }
    a {
      color: var(--accent);
      font-size: 0.84rem;
      font-weight: 560;
      text-decoration: none;
    }
    a:hover { text-decoration: underline; }
    .lang { display: flex; gap: 6px; }
    .lang button {
      font-size: 0.73rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      padding: 4px 10px;
      border-radius: 999px;
      border: 1px solid #b5c1b8;
      background: #f4f0e7;
      color: #4a5c52;
      cursor: pointer;
    }
    .lang button.on { border-color: var(--accent); color: var(--accent); box-shadow: 0 0 0 2px rgba(47, 133, 90, 0.14); }
    @media (max-width: 520px) {
      body { padding: 16px; }
      .wrap { padding: 16px; }
      .row2 { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="top">
      <a href="/"><span data-i18n="back">← Home</span></a>
      <div class="lang"><button type="button" id="ko">KO</button><button type="button" id="en">EN</button></div>
    </div>
    <h1><span data-i18n="h1">Member sign in</span></h1>
    <p class="sub"><span data-i18n="sub">Use your member account (not admin).</span></p>
    <label><span data-i18n="em">Email</span></label>
    <input type="email" id="email" autocomplete="username">
    <label><span data-i18n="pw">Password</span></label>
    <input type="password" id="password" autocomplete="current-password">
    <label><span data-i18n="fn">Full name (register)</span></label>
    <input type="text" id="full_name">
    <div class="row2">
      <div><label><span data-i18n="cc">Country</span></label><select id="country_code"></select></div>
      <div><label><span data-i18n="ph">Phone digits</span></label><input type="tel" id="phone" inputmode="numeric"></div>
    </div>
    <button class="btn" type="button" id="go"><span data-i18n="go">Sign in</span></button>
    <button class="btn btn2" type="button" id="reg"><span data-i18n="reg">Create account</span></button>
    <div id="msg" class="msg"></div>
  </div>
  <script>
    const CC = { AU:"+61",KR:"+82",US:"+1",JP:"+81",GB:"+44",DE:"+49" };
    const sel = document.getElementById("country_code");
    Object.keys(CC).forEach(c => { const o=document.createElement("option"); o.value=c; o.textContent=c; if(c==="KR")o.selected=true; sel.appendChild(o); });
    const S = {
      en: { back:"← Home", h1:"Member sign in", sub:"Use your member account (not admin).", em:"Email", pw:"Password", fn:"Full name (register)", cc:"Country", ph:"Phone digits", go:"Sign in", reg:"Create account", badAdmin:"This account is admin. Use the admin login page.", need:"Enter email and password.", net:"Cannot reach server.", bad:"Login failed.", working:"…" },
      ko: { back:"← 처음", h1:"회원 로그인", sub:"일반 회원 계정으로 로그인하세요.", em:"이메일", pw:"비밀번호", fn:"이름 (가입 시)", cc:"국가", ph:"전화(숫자)", go:"로그인", reg:"회원가입", badAdmin:"관리자 계정입니다. 관리자 로그인을 이용하세요.", need:"이메일과 비밀번호를 입력하세요.", net:"서버에 연결할 수 없습니다.", bad:"로그인 실패.", working:"처리 중…" }
    };
    let lang = localStorage.getItem("fitlio_lang")||"ko";
    function t(k){ return (S[lang]&&S[lang][k])||k; }
    function apply(){
      document.querySelectorAll("[data-i18n]").forEach(el=>{ const k=el.getAttribute("data-i18n"); el.textContent=t(k); });
      document.getElementById("ko").classList.toggle("on",lang==="ko");
      document.getElementById("en").classList.toggle("on",lang==="en");
    }
    function show(ok, text){
      const m=document.getElementById("msg");
      m.className="msg "+(ok?"ok":"err");
      m.textContent=text;
      m.style.display="block";
    }
    function errDetail(data){
      if(!data||data.detail==null) return t("bad");
      const d=data.detail;
      if(typeof d==="string") return d;
      if(Array.isArray(d)) return d.map(e=>(e&&e.msg)||"").filter(Boolean).join(" ")||t("bad");
      return t("bad");
    }
    document.getElementById("ko").onclick=()=>{ lang="ko"; localStorage.setItem("fitlio_lang",lang); apply(); };
    document.getElementById("en").onclick=()=>{ lang="en"; localStorage.setItem("fitlio_lang",lang); apply(); };
    document.getElementById("go").onclick=async()=>{
      const email=document.getElementById("email").value.trim(), password=document.getElementById("password").value;
      const goBtn=document.getElementById("go");
      if(!email||!password){ show(false,t("need")); return; }
      goBtn.disabled=true;
      const old=goBtn.querySelector('[data-i18n="go"]'); if(old) old.textContent=t("working");
      try {
        const res=await fetch("/auth/login",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({email,password})});
        const data=await res.json().catch(()=>({}));
        if(!res.ok){ show(false, errDetail(data)); return; }
        if(!data.access_token){ show(false,t("bad")); return; }
        if(data.role==="admin"){ show(false,t("badAdmin")); return; }
        localStorage.setItem("token",data.access_token);
        localStorage.setItem("member_id",String(data.member_id));
        localStorage.setItem("user_role",data.role||"member");
        location.href="/app/member";
      } catch(e) {
        show(false,t("net"));
      } finally {
        goBtn.disabled=false;
        apply();
      }
    };
    document.getElementById("reg").onclick=async()=>{
      const body={ email:document.getElementById("email").value.trim(), password:document.getElementById("password").value,
        full_name:document.getElementById("full_name").value.trim()||"Member", phone:document.getElementById("phone").value.trim()||"01000000000", country_code:document.getElementById("country_code").value };
      try {
        const res=await fetch("/auth/register",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(body)});
        const data=await res.json().catch(()=>({}));
        show(res.ok, res.ok?(data.message||"OK"):errDetail(data));
      } catch(e) { show(false,t("net")); }
    };
    apply();
  </script>
</body>
</html>
