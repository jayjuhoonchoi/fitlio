<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fitlio — Admin</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --font-sans: Inter, "SF Pro Text", "Segoe UI", Roboto, "Noto Sans KR", "Apple SD Gothic Neo", "Malgun Gothic", -apple-system, system-ui, sans-serif;
      --bg: #f4f2e9;
      --panel: #fffdf8;
      --panel-soft: #f7f4eb;
      --line: #d2dbd1;
      --line-strong: #b3c6b8;
      --text: #223127;
      --muted: #5e7063;
      --heading: #1d4a36;
      --accent: #2f855a;
      --accent-2: #3f9b6b;
      --radius-sm: 10px;
      --radius-md: 14px;
      --radius-lg: 18px;
      --shadow-soft: 0 10px 24px rgba(28, 48, 37, 0.08);
      --shadow-strong: 0 18px 34px rgba(28, 48, 37, 0.12);
      --focus-ring: 0 0 0 3px rgba(47, 133, 90, 0.18);
      --glass: 0 0 0 1px rgba(255, 255, 255, 0.72) inset, 0 0 0 1px rgba(174, 196, 181, 0.4);
    }
    @keyframes riseIn {
      from { opacity: 0; transform: translateY(5px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes softPop {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }
    body {
      font-family: var(--font-sans);
      font-size: 15px;
      line-height: 1.55;
      letter-spacing: 0.004em;
      background:
        radial-gradient(circle at 0% 16%, rgba(88, 180, 133, 0.1), transparent 32%),
        radial-gradient(circle at 100% 0%, rgba(205, 214, 225, 0.15), transparent 30%),
        var(--bg);
      color: var(--text);
      display: flex;
      min-height: 100vh;
    }
    nav {
      width: 232px;
      background: linear-gradient(180deg, #eef4ea, #edf3e7);
      border-right: 1px solid var(--line);
      padding: 16px 12px;
      flex-shrink: 0;
      box-shadow: 8px 0 24px rgba(33, 49, 39, 0.06);
      backdrop-filter: blur(8px);
    }
    nav button {
      display: block;
      width: 100%;
      text-align: left;
      padding: 9px 11px;
      margin-bottom: 6px;
      border: 1px solid transparent;
      border-radius: var(--radius-sm);
      background: transparent;
      color: #3f5246;
      cursor: pointer;
      font-size: 0.84rem;
      font-weight: 550;
      line-height: 1.35;
      transition: all 0.16s ease;
    }
    nav button.on,
    nav button:hover {
      background: linear-gradient(145deg, #dfead9, #e9f1e4);
      border-color: var(--line-strong);
      color: #214c38;
      transform: translateY(-1px);
      box-shadow: 0 8px 14px rgba(58, 86, 68, 0.14);
    }
    main {
      flex: 1;
      padding: 24px;
      overflow: auto;
    }
    h1 {
      font-size: 1.26rem;
      line-height: 1.3;
      font-weight: 660;
      letter-spacing: 0.01em;
      margin-bottom: 16px;
      color: var(--heading);
    }
    h2 {
      font-size: 1.02rem;
      line-height: 1.3;
      font-weight: 620;
      letter-spacing: 0.01em;
      color: #2a5740;
    }
    pre,
    .box {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius-md);
      padding: 12px;
      font-size: 0.8rem;
      line-height: 1.5;
      overflow: auto;
      max-height: 70vh;
      white-space: pre-wrap;
      word-break: break-word;
      box-shadow: var(--shadow-soft);
      animation: riseIn 0.22s ease both;
    }
    .row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 12px;
      align-items: center;
    }
    input,
    select,
    textarea {
      padding: 8px 10px;
      border-radius: var(--radius-sm);
      border: 1px solid #b8c5bc;
      background: #fffdf8;
      color: var(--text);
      font-family: inherit;
      font-size: 0.87rem;
      line-height: 1.4;
      transition: border-color 0.14s ease, box-shadow 0.14s ease, transform 0.14s ease;
    }
    input:focus,
    select:focus,
    textarea:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: var(--focus-ring);
      transform: translateY(-1px);
    }
    .btn {
      padding: 9px 14px;
      border-radius: var(--radius-sm);
      border: 1px solid rgba(47, 133, 90, 0.5);
      background: linear-gradient(140deg, var(--accent), var(--accent-2));
      color: #f2f7f2;
      font-size: 0.83rem;
      font-weight: 640;
      line-height: 1.25;
      letter-spacing: 0.01em;
      cursor: pointer;
      box-shadow: 0 8px 14px rgba(47, 133, 90, 0.22), 0 1px 0 rgba(255, 255, 255, 0.32) inset;
      transition: transform 0.14s ease, box-shadow 0.14s ease, filter 0.14s ease;
    }
    .btn:hover { transform: translateY(-1px); box-shadow: 0 11px 18px rgba(47, 133, 90, 0.27); filter: saturate(1.04); }
    .btn:active,
    .btn.is-press { transform: translateY(1px) scale(0.988); box-shadow: 0 6px 12px rgba(47, 133, 90, 0.18); filter: brightness(0.94); }
    .btn2 {
      background: linear-gradient(160deg, #f8f6ef, #ece8dd);
      color: #34473b;
      border: 1px solid #bcc8bd;
      box-shadow: 0 6px 12px rgba(40, 58, 46, 0.1);
    }
    .btnWarn {
      background: linear-gradient(140deg, #9f1239, #c01f4f);
      border-color: #9f1239;
      color: #fff4f6;
    }
    .lang { margin-bottom: 16px; }
    .lang button {
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      padding: 3px 8px;
      margin-right: 4px;
      border-radius: 7px;
      border: 1px solid #b9c5bc;
      background: #fffdf7;
      color: #435649;
      cursor: pointer;
    }
    .lang button.on { border-color: var(--accent); color: var(--accent); }
    #out { margin-top: 12px; width: 100%; }
    .table {
      width: 100%;
      border-collapse: separate;
      border-spacing: 0;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 12px;
      overflow: hidden;
      box-shadow: var(--shadow-soft);
    }
    .table th,
    .table td {
      text-align: left;
      padding: 10px;
      border-bottom: 1px solid #e3ebe1;
      font-size: 0.82rem;
      line-height: 1.45;
      vertical-align: top;
    }
    .table th {
      background: #eef4ea;
      color: #3a4f43;
      font-size: 0.76rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      font-weight: 650;
    }
    .table tbody tr { transition: background-color 0.14s ease; }
    .table tbody tr:hover { background: #f3f8f2; }
    .chip {
      padding: 3px 8px;
      border-radius: 999px;
      font-size: 0.72rem;
      font-weight: 620;
      border: 1px solid #b8c5bb;
      background: #f3f6f2;
      text-transform: lowercase;
      letter-spacing: 0.01em;
    }
    .chip.pending { background: #fff4db; border-color: #f3cb7f; color: #8a5a00; }
    .chip.sent { background: #e8f6ee; border-color: #9dd6b4; color: #1f6a43; }
    .chip.failed { background: #fde8ed; border-color: #f2a2b7; color: #9f1239; }
    .chip.completed { background: #e8f6ee; border-color: #9dd6b4; color: #1f6a43; }
    .chip.active { background: #e8f6ee; border-color: #9dd6b4; color: #1f6a43; }
    .chip.cancelled { background: #eceff3; border-color: #c3ccd6; color: #5e6b78; }
    .chip.error { background: #fde8ed; border-color: #f2a2b7; color: #9f1239; }
    .stats {
      display: grid;
      gap: 12px;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      margin-bottom: 16px;
    }
    .kpi {
      background: linear-gradient(165deg, #fffefb, var(--panel));
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 12px;
      box-shadow: var(--shadow-soft);
      animation: riseIn 0.22s ease both;
      position: relative;
      overflow: hidden;
    }
    .kpi::after { content: ""; position: absolute; inset: 0; pointer-events: none; box-shadow: var(--glass); border-radius: 12px; }
    .kpi b {
      display: block;
      margin-top: 4px;
      font-size: 1.32rem;
      line-height: 1.2;
      font-weight: 700;
      letter-spacing: -0.015em;
      color: #236a47;
    }
    .hint {
      font-size: 0.8rem;
      color: var(--muted);
      margin-bottom: 8px;
      line-height: 1.45;
    }
    .bar-wrap { display: grid; gap: 6px; margin-top: 10px; }
    .bar-row {
      display: grid;
      grid-template-columns: 74px 1fr 114px;
      align-items: center;
      gap: 8px;
      font-size: 0.79rem;
      color: #435649;
    }
    .bar {
      height: 11px;
      border-radius: 999px;
      background: #e4ebe2;
      overflow: hidden;
    }
    .bar > i { display: block; height: 100%; background: linear-gradient(90deg, #2f855a, #58b485); }
    .flash {
      margin-bottom: 10px;
      font-size: 0.84rem;
      font-weight: 550;
      line-height: 1.4;
      color: #9f1239;
      min-height: 1.2em;
    }
    .flash.ok { color: #166534; }
    #panel .row,
    #panel .table,
    #panel .box { animation: riseIn 0.22s ease both; }
    #panel.panel-enter { animation: softPop 0.28s cubic-bezier(0.22, 0.61, 0.36, 1) both; }
    .stagger > * { animation: softPop 0.3s cubic-bezier(0.22, 0.61, 0.36, 1) both; }
    .stagger > *:nth-child(2) { animation-delay: 0.03s; }
    .stagger > *:nth-child(3) { animation-delay: 0.06s; }
    .stagger > *:nth-child(4) { animation-delay: 0.09s; }
    .stagger > *:nth-child(5) { animation-delay: 0.12s; }
    .stagger > *:nth-child(6) { animation-delay: 0.15s; }
    .empty-state {
      border: 1px dashed #bfd0c4;
      border-radius: 12px;
      padding: 12px;
      background: linear-gradient(145deg, #f9fcf7, #f3f8f1);
      color: #557061;
      font-size: 0.84rem;
      line-height: 1.5;
      box-shadow: 0 8px 14px rgba(32, 46, 38, 0.06);
    }
    @media (max-width: 920px) {
      nav { width: 208px; padding: 12px 10px; }
      main { padding: 16px; }
      .stats { gap: 10px; }
      .row { margin-bottom: 10px; }
    }
    @media (max-width: 760px) {
      body { display: block; }
      nav {
        width: 100%;
        border-right: 0;
        border-bottom: 1px solid var(--line);
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 6px;
      }
      nav button { margin-bottom: 0; }
      #out { grid-column: 1 / -1; }
    }
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
        scroll-behavior: auto !important;
      }
    }
  </style>
</head>
<body>
  <nav>
    <div class="lang"><button type="button" id="ko">KO</button><button type="button" id="en">EN</button></div>
    <button type="button" class="on" data-tab="dash" data-i18n="t0">Dashboard</button>
    <button type="button" data-tab="sales" data-i18n="t1">Sales</button>
    <button type="button" data-tab="pay" data-i18n="t2">Payments</button>
    <button type="button" data-tab="mem" data-i18n="t3">Members</button>
    <button type="button" data-tab="cls" data-i18n="t4">Classes</button>
    <button type="button" data-tab="ins" data-i18n="t5">Instructors</button>
    <button type="button" data-tab="sal" data-i18n="t6">Payroll</button>
    <button type="button" data-tab="not" data-i18n="t7">Notifications</button>
    <button type="button" data-tab="rep" data-i18n="t8">Reports</button>
    <button type="button" data-tab="msg" data-i18n="t9">Messages</button>
    <button type="button" data-tab="ctr" data-i18n="t10">Centers</button>
    <button type="button" class="btn" id="out" data-i18n="out">Sign out</button>
  </nav>
  <main>
    <h1 id="title">Dashboard</h1>
    <div id="panel"></div>
  </main>
  <script>
    const token = localStorage.getItem("token");
    if (!token || localStorage.getItem("user_role") !== "admin") location.href = "/admin-login";
    const H = { Authorization: "Bearer " + token };
    const S = {
      en: { t0:"Dashboard",t1:"Sales",t2:"Payments",t3:"Members",t4:"Classes",t5:"Instructors",t6:"Payroll",t7:"Notifications",t8:"Reports",t9:"Messages",t10:"Centers",out:"Sign out", dash:"Overview", sales:"Monthly sales", pay:"Recent payments", mem:"All members", cls:"Schedule + edit", ins:"Profiles + edit", sal:"Select instructor + month", not:"Queue + create", rep:"Retention reports", go:"Load", cr:"Create request", topic:"Topic", msg:"Message", mid:"Member id (opt)", addins:"Add instructor", name:"Display name", run:"Calculate payroll", del:"Delete", save:"Save", createClass:"Create class", className:"Class name", when:"Schedule(ISO)", cap:"Capacity", status:"Status", markSent:"Mark sent", markFail:"Mark failed", markPending:"Mark pending", trend:"Revenue trend", recent:"Last", months:"months", err:"Request failed", ok:"Saved", growth:"Member growth", retention:"Retention", util:"Class utilization", avgFill:"Avg fill" },
      ko: { t0:"대시보드",t1:"매출",t2:"결제",t3:"회원",t4:"수업",t5:"강사",t6:"급여",t7:"알림",t8:"리포트",t9:"메세지",t10:"센터",out:"로그아웃", dash:"요약", sales:"월 매출", pay:"결제 목록", mem:"전체 회원", cls:"일정·수정", ins:"프로필·수정", sal:"강사+월 선택", not:"대기열·생성", rep:"리텐션 리포트", go:"불러오기", cr:"알림 요청", topic:"주제", msg:"내용", mid:"회원번호(선택)", addins:"강사 추가", name:"표시 이름", run:"급여 계산", del:"삭제", save:"저장", createClass:"수업 생성", className:"수업명", when:"일시(ISO)", cap:"정원", status:"상태", markSent:"전송 완료", markFail:"실패 처리", markPending:"대기 처리", trend:"매출 추이", recent:"최근", months:"개월", err:"요청 실패", ok:"저장됨", growth:"회원 성장", retention:"유지율", util:"수업 충원율", avgFill:"평균 충원율" }
    };
    let lang = localStorage.getItem("fitlio_lang")||"ko";
    function t(k){ return S[lang][k]||k; }
    function applyNav(){ document.querySelectorAll("nav [data-i18n]").forEach(b=>{ if(b.id!=="out") b.textContent=t(b.getAttribute("data-i18n")); }); document.getElementById("out").textContent=t("out"); document.getElementById("ko").classList.toggle("on",lang==="ko"); document.getElementById("en").classList.toggle("on",lang==="en"); }
    document.getElementById("ko").onclick=()=>{lang="ko";localStorage.setItem("fitlio_lang",lang);applyNav(); render(currentTab);};
    document.getElementById("en").onclick=()=>{lang="en";localStorage.setItem("fitlio_lang",lang);applyNav(); render(currentTab);};
    document.getElementById("out").onclick=()=>{localStorage.clear();location.href="/admin-login";};
    let currentTab="dash";
    document.querySelectorAll("nav [data-tab]").forEach(b=>{
      b.onclick=()=>{ document.querySelectorAll("nav [data-tab]").forEach(x=>x.classList.remove("on")); b.classList.add("on"); currentTab=b.dataset.tab; render(currentTab); };
    });
    async function api(path, opt={}){
      const r=await fetch(path,{...opt,headers:{...H,...opt.headers||{}}});
      if(r.status===401||r.status===403){ localStorage.clear(); location.href="/admin-login"; return null;}
      return r;
    }
    async function apiJson(path, opt={}){
      const r=await api(path,opt);
      if(!r) throw new Error("unauthorized");
      const data = await r.json().catch(()=>({}));
      if(!r.ok){
        const d = data && data.detail;
        throw new Error(typeof d === "string" ? d : t("err"));
      }
      return data;
    }
    function flash(text, ok){
      const el = document.getElementById("flash");
      if(!el) return;
      el.textContent = text || "";
      el.classList.toggle("ok", !!ok);
    }
    function statusChip(status){
      const s = String(status||"").toLowerCase();
      return `<span class="chip ${s}">${esc(s || "unknown")}</span>`;
    }
    function runKpiCountUp(root){
      if(window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches) return;
      const scope = root || document;
      scope.querySelectorAll(".kpi b").forEach((el)=>{
        const raw = (el.textContent||"").trim();
        const m = raw.match(/^([^0-9\-]*)(-?\d[\d,]*(?:\.\d+)?)(.*)$/);
        if(!m) return;
        const prefix = m[1] || "";
        const numRaw = m[2] || "";
        const suffix = m[3] || "";
        const target = Number(numRaw.replace(/,/g,""));
        if(Number.isNaN(target)) return;
        const decimals = (numRaw.split(".")[1]||"").length;
        const fmt = new Intl.NumberFormat("en-US",{minimumFractionDigits:decimals,maximumFractionDigits:decimals});
        const started = performance.now();
        const duration = 720;
        function tick(now){
          const p = Math.min(1, (now - started) / duration);
          const eased = 1 - Math.pow(1 - p, 3);
          const value = target * eased;
          el.textContent = `${prefix}${fmt.format(value)}${suffix}`;
          if(p < 1) requestAnimationFrame(tick);
        }
        el.textContent = `${prefix}${fmt.format(0)}${suffix}`;
        requestAnimationFrame(tick);
      });
    }
    async function render(tab){
      applyNav();
      const p=document.getElementById("panel");
      p.innerHTML='<div id="flash" class="flash"></div>';
      p.classList.remove("panel-enter");
      void p.offsetWidth;
      p.classList.add("panel-enter");
      const title=document.getElementById("title");
      if(tab==="dash"){
        title.textContent=t("dash");
        try{
          const stats = await apiJson("/admin/stats");
          const trend = await apiJson("/admin/sales/trend?months=6");
          const maxAmt = Math.max(...trend.points.map(x=>x.total_amount), 1);
          p.innerHTML=`<div id="flash" class="flash"></div>
            <div class="stats stagger">
              <div class="kpi">Members<b>${stats.total_members}</b></div>
              <div class="kpi">Active passes<b>${stats.active_memberships}</b></div>
              <div class="kpi">Today check-ins<b>${stats.today_attendance}</b></div>
              <div class="kpi">Upcoming 7d classes<b>${stats.upcoming_7d_classes}</b></div>
              <div class="kpi">Pending notifications<b>${stats.pending_notifications}</b></div>
              <div class="kpi">Total classes<b>${stats.total_classes}</b></div>
            </div>
            <div class="box stagger"><div class="hint">${t("trend")} · ${t("recent")} 6 ${t("months")}</div>
            <div class="bar-wrap">${trend.points.map(x=>`<div class="bar-row"><span>${x.label}</span><div class="bar"><i style="width:${Math.max(4, (x.total_amount/maxAmt)*100)}%"></i></div><span>$${x.total_amount.toLocaleString()}</span></div>`).join("")}</div></div>`;
          runKpiCountUp(p);
        } catch(e){ flash(e.message || t("err")); }
        return;
      }
      if(tab==="sales"){ title.textContent=t("sales"); const now=new Date();
        p.innerHTML+=`<div class="row"><label>Year</label><input id="sy" type="number" value="${now.getFullYear()}"><label>Month</label><input id="sm" type="number" min="1" max="12" value="${now.getMonth()+1}"><button class="btn" id="sg">${t("go")}</button></div><div id="sx"></div><div class="row"><label>${t("recent")}</label><input id="tm" type="number" min="1" max="24" value="12"><button class="btn" id="tg">${t("trend")}</button></div><div id="tx"></div>`;
        document.getElementById("sg").onclick=async()=>{ try{ const data=await apiJson("/admin/sales?year="+document.getElementById("sy").value+"&month="+document.getElementById("sm").value); document.getElementById("sx").innerHTML="<pre>"+JSON.stringify(data,null,2)+"</pre>"; flash(""); }catch(e){ flash(e.message||t("err")); } };
        document.getElementById("tg").onclick=async()=>{ try{ const months=+document.getElementById("tm").value||12; const data=await apiJson("/admin/sales/trend?months="+months); const maxAmt=Math.max(...data.points.map(x=>x.total_amount),1); document.getElementById("tx").innerHTML=`<div class="box"><div class="bar-wrap">${data.points.map(x=>`<div class="bar-row"><span>${x.label}</span><div class="bar"><i style="width:${Math.max(4,(x.total_amount/maxAmt)*100)}%"></i></div><span>$${x.total_amount.toLocaleString()}</span></div>`).join("")}</div></div>`; flash(""); }catch(e){ flash(e.message||t("err")); } };
        return;}
      if(tab==="pay"){ title.textContent=t("pay"); let j=[]; try{ j=await apiJson("/admin/payments"); }catch(e){ flash(e.message||t("err")); return; }
        p.innerHTML=j.length?`<table class="table"><thead><tr><th>ID</th><th>Member</th><th>Amount</th><th>${t("status")}</th><th>At</th></tr></thead><tbody>${j.map(x=>`<tr><td>${x.id}</td><td>${x.member_id}</td><td>${x.amount} ${x.currency}</td><td>${statusChip(x.status)}</td><td>${new Date(x.created_at).toLocaleString()}</td></tr>`).join("")}</tbody></table>`:`<div class="empty-state">No payment records yet.</div>`; return;}
      if(tab==="mem"){ title.textContent=t("mem"); let j=[]; try{ j=await apiJson("/admin/members"); }catch(e){ flash(e.message||t("err")); return; }
        p.innerHTML=`<div id="flash" class="flash"></div>
        <table class="table"><thead><tr><th>ID</th><th>Member No</th><th>Name</th><th>Email</th><th>Phone</th><th>Birth</th><th>Level</th><th>Role</th><th>Active</th><th></th></tr></thead><tbody>
        ${j.map(x=>`<tr>
          <td>${x.id}</td>
          <td><input id="mno_${x.id}" value="${esc(x.member_no||"")}"></td>

        document.getElementById("jDirect").onclick=async()=>{ try{ await apiJson("/centers/join-by-email",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({center_slug:val("jSlug"),member_email:val("jEmail")})}); flash("member attached",true);}catch(e){ flash(e.message||t("err")); } };
        document.getElementById("aRun").onclick=async()=>{ try{ await apiJson("/centers/join-approval",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({center_id:+val("aCenterId"),member_id:+val("aMemberId"),approve:val("aApprove")==="true"})}); flash("approval updated",true);}catch(e){ flash(e.message||t("err")); } };
        document.getElementById("pRun").onclick=async()=>{ try{ await apiJson("/centers/onsite-payment",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({center_id:+val("pCenterId"),member_id:+val("pMemberId"),amount:+val("pAmount"),memo:val("pMemo")||null})}); flash("on-site payment recorded",true);}catch(e){ flash(e.message||t("err")); } };
        document.getElementById("tRun").onclick=async()=>{ try{ await apiJson("/centers/"+encodeURIComponent(val("tCenterId"))+"/tablet-theme",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({tablet_theme:val("tTheme"),tablet_welcome_text:val("tWelcome"),tablet_logo_url:val("tLogo")||null,tablet_accent_color:val("tAccent")||null,tablet_background_url:val("tBg")||null})}); flash("tablet branding saved",true);}catch(e){ flash(e.message||t("err")); } };
        document.getElementById("tOpen").onclick=async()=>{ try{ const centerId=+val("tCenterId"); const center = await apiJson("/centers/"+centerId); window.open("/app/tablet/"+encodeURIComponent(center.slug), "_blank"); }catch(e){ flash(e.message||t("err")); } };
        document.getElementById("mRefresh").onclick=async()=>{ try{ const rows=await apiJson("/member/moderation/reports"); const box=document.getElementById("mQueue"); box.innerHTML = rows.length ? rows.slice(0,40).map(r=>`<div style="margin-bottom:.45rem;padding:.5rem;border:1px solid #d1d9d0;border-radius:8px"><b>#${r.id}</b> ${esc(r.target_type)}:${r.target_id} · ${esc(r.reason)} · <i>${esc(r.status)}</i><div style="margin-top:.35rem"><button class="btn btnWarn" data-hide="${r.id}:${r.target_type}:${r.target_id}">Hide</button> <button class="btn btn2" data-resolve="${r.id}">Resolve</button> <button class="btn btn2" data-reject="${r.id}">Reject</button></div></div>`).join("") : "No open reports."; box.querySelectorAll("[data-hide]").forEach(b=>b.onclick=async()=>{ const [rid,target_type,target_id]=b.dataset.hide.split(":"); await apiJson("/member/moderation/hide",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({target_type,target_id:+target_id,hide:true,reason:"reported"})}); await apiJson("/member/moderation/reports/status",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({report_id:+rid,status:"resolved"})}); flash("content hidden + report resolved",true); document.getElementById("mRefresh").click(); }); box.querySelectorAll("[data-resolve]").forEach(b=>b.onclick=async()=>{ await apiJson("/member/moderation/reports/status",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({report_id:+b.dataset.resolve,status:"resolved"})}); flash("report resolved",true); document.getElementById("mRefresh").click(); }); box.querySelectorAll("[data-reject]").forEach(b=>b.onclick=async()=>{ await apiJson("/member/moderation/reports/status",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({report_id:+b.dataset.reject,status:"rejected"})}); flash("report rejected",true); document.getElementById("mRefresh").click(); }); }catch(e){ flash(e.message||t("err")); } };
        return;
      }
    }
    function esc(s){ const d=document.createElement("div"); d.textContent=(s==null?"":String(s)); return d.innerHTML; }
    function val(id){ const el=document.getElementById(id); return el ? el.value.trim() : ""; }
    document.addEventListener("pointerdown",(e)=>{
      const b = e.target.closest(".btn");
      if(!b) return;
      b.classList.add("is-press");
      setTimeout(()=>b.classList.remove("is-press"),140);
    });
    applyNav(); render("dash");
  </script>
</body>
</html>
