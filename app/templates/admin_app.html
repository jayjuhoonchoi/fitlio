<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fitlio — Admin</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root{
      --bg:#f5f3ea;
      --panel:#fffdf7;
      --line:#d1d9d0;
      --line-strong:#9fbaa5;
      --accent:#2f855a;
      --accent-2:#58b485;
      --muted:#627267;
      --text:#2f3b32;
    }
    @keyframes riseIn {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }
    body {
      font-family: Inter, system-ui, sans-serif;
      background:
        radial-gradient(circle at 0% 15%, rgba(88,180,133,.14), transparent 30%),
        radial-gradient(circle at 100% 0%, rgba(205,214,225,.28), transparent 28%),
        var(--bg);
      color: var(--text);
      display: flex;
      min-height: 100vh;
    }
    nav {
      width: 220px;
      background: linear-gradient(180deg, #eef4ea, #edf3e7);
      border-right: 1px solid #cdd7ca;
      padding: 1rem .75rem;
      flex-shrink: 0;
      box-shadow: 8px 0 20px rgba(33,49,39,.05);
    }
    nav button {
      display: block;
      width: 100%;
      text-align: left;
      padding: .58rem .7rem;
      margin-bottom: .3rem;
      border: 1px solid transparent;
      border-radius: 10px;
      background: transparent;
      color: #435649;
      cursor: pointer;
      font-size: .85rem;
      transition: all .16s ease;
    }
    nav button.on, nav button:hover {
      background: linear-gradient(135deg, #dfead9, #e9f1e4);
      border-color: var(--line-strong);
      color: #24503c;
      transform: translateY(-1px);
      box-shadow: 0 8px 14px rgba(58,86,68,.14);
    }
    main { flex: 1; padding: 1rem 1.25rem; overflow: auto; }
    h1 { font-size: 1.15rem; margin-bottom: 1rem; color: #24503c; }
    pre, .box { background: #fffdf7; border: 1px solid #d1d9d0; border-radius: 12px; padding: .75rem; font-size: .78rem; overflow: auto; max-height: 70vh; white-space: pre-wrap; word-break: break-word; box-shadow: 0 12px 26px rgba(30,45,36,.08); animation: riseIn .24s ease both; }
    .row { display: flex; gap: .5rem; flex-wrap: wrap; margin-bottom: .75rem; align-items: center; }
    input, select, textarea { padding: .45rem .55rem; border-radius: 8px; border: 1px solid #b9c5bc; background: #fffdf7; color: #2f3b32; transition: border-color .14s ease, box-shadow .14s ease, transform .14s ease; }
    input:focus, select:focus, textarea:focus { outline: none; border-color: #2f855a; box-shadow: 0 0 0 3px rgba(47,133,90,.15); transform: translateY(-1px); }
    .btn {
      padding: .48rem .82rem;
      border-radius: 10px;
      border: 1px solid rgba(47,133,90,.5);
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      color: #f2f7f2;
      font-weight: 650;
      cursor: pointer;
      box-shadow: 0 8px 14px rgba(47,133,90,.24);
      transition: transform .14s ease, box-shadow .14s ease, filter .14s ease;
    }
    .btn:hover { transform: translateY(-1px); box-shadow: 0 12px 18px rgba(47,133,90,.29); filter: saturate(1.06); }
    .btn:active { transform: translateY(1px) scale(.985); box-shadow: 0 6px 12px rgba(47,133,90,.2); filter: brightness(.94); }
    .btn.is-press { transform: translateY(1px) scale(.985); box-shadow: 0 6px 12px rgba(47,133,90,.2); filter: brightness(.94); }
    .btnWarn { background: linear-gradient(135deg,#9f1239,#c01f4f); border-color:#9f1239; }
    .lang { margin-bottom: 1rem; }
    .lang button { font-size: .7rem; padding: .15rem .4rem; margin-right: .25rem; border-radius: 6px; border: 1px solid #b9c5bc; background: #fffdf7; color: #435649; cursor: pointer; }
    .lang button.on { border-color: #2f855a; color: #2f855a; }
    #out { margin-top: 1rem; width: 100%; }
    .table { width: 100%; border-collapse: collapse; background: #fffdf7; border: 1px solid #d1d9d0; border-radius: 10px; overflow: hidden; }
    .table th, .table td { text-align: left; padding: .55rem; border-bottom: 1px solid #e5ebe2; font-size: .82rem; }
    .table th { background: #eef4ea; color: #3d5145; }
    .table tbody tr { transition: background-color .14s ease; }
    .table tbody tr:hover { background: #f3f8f2; }
    .chip { padding: .15rem .5rem; border-radius: 999px; font-size: .72rem; border: 1px solid #b8c5bb; background: #f3f6f2; }
    .stats { display: grid; gap: .75rem; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); margin-bottom: 1rem; }
    .kpi { background: linear-gradient(160deg, #fffefb, #fffdf7); border: 1px solid #d1d9d0; border-radius: 12px; padding: .75rem; box-shadow: 0 10px 20px rgba(31,46,37,.08); animation: riseIn .24s ease both; }
    .kpi b { display: block; font-size: 1.25rem; color: #276b49; margin-top: .2rem; }
    .hint { font-size: .8rem; color: #627267; margin-bottom: .5rem; }
    .bar-wrap { display: grid; gap: .4rem; margin-top: .75rem; }
    .bar-row { display: grid; grid-template-columns: 70px 1fr 110px; align-items: center; gap: .5rem; font-size: .8rem; color: #435649; }
    .bar { height: 12px; border-radius: 999px; background: #e4ebe2; overflow: hidden; }
    .bar > i { display: block; height: 100%; background: linear-gradient(90deg,#2f855a,#58b485); }
    .flash { margin-bottom: .7rem; font-size: .85rem; color: #9f1239; min-height: 1.2em; }
    .flash.ok { color: #166534; }
    #panel .row, #panel .table, #panel .box { animation: riseIn .22s ease both; }
  </style>
</head>
<body>
  <nav>
    <div class="lang"><button type="button" id="ko">KO</button><button type="button" id="en">EN</button></div>
    <button type="button" class="on" data-tab="dash" data-i18n="t0">Dashboard</button>
    <button type="button" data-tab="sales" data-i18n="t1">Sales</button>
    <button type="button" data-tab="pay" data-i18n="t2">Payments</button>
    <button type="button" data-tab="mem" data-i18n="t3">Members</button>
    <button type="button" data-tab="cls" data-i18n="t4">Classes</button>
    <button type="button" data-tab="ins" data-i18n="t5">Instructors</button>
    <button type="button" data-tab="sal" data-i18n="t6">Payroll</button>
    <button type="button" data-tab="not" data-i18n="t7">Notifications</button>
    <button type="button" data-tab="rep" data-i18n="t8">Reports</button>
    <button type="button" data-tab="msg" data-i18n="t9">Messages</button>
    <button type="button" class="btn" id="out" data-i18n="out">Sign out</button>
  </nav>
  <main>
    <h1 id="title">Dashboard</h1>
    <div id="panel"></div>
  </main>
  <script>
    const token = localStorage.getItem("token");
    if (!token || localStorage.getItem("user_role") !== "admin") location.href = "/admin-login";
    const H = { Authorization: "Bearer " + token };
    const S = {
      en: { t0:"Dashboard",t1:"Sales",t2:"Payments",t3:"Members",t4:"Classes",t5:"Instructors",t6:"Payroll",t7:"Notifications",t8:"Reports",t9:"Messages",out:"Sign out", dash:"Overview", sales:"Monthly sales", pay:"Recent payments", mem:"All members", cls:"Schedule + edit", ins:"Profiles + edit", sal:"Select instructor + month", not:"Queue + create", rep:"Retention reports", go:"Load", cr:"Create request", topic:"Topic", msg:"Message", mid:"Member id (opt)", addins:"Add instructor", name:"Display name", run:"Calculate payroll", del:"Delete", save:"Save", createClass:"Create class", className:"Class name", when:"Schedule(ISO)", cap:"Capacity", status:"Status", markSent:"Mark sent", markFail:"Mark failed", markPending:"Mark pending", trend:"Revenue trend", recent:"Last", months:"months", err:"Request failed", ok:"Saved", growth:"Member growth", retention:"Retention", util:"Class utilization", avgFill:"Avg fill" },
      ko: { t0:"대시보드",t1:"매출",t2:"결제",t3:"회원",t4:"수업",t5:"강사",t6:"급여",t7:"알림",t8:"리포트",t9:"메세지",out:"로그아웃", dash:"요약", sales:"월 매출", pay:"결제 목록", mem:"전체 회원", cls:"일정·수정", ins:"프로필·수정", sal:"강사+월 선택", not:"대기열·생성", rep:"리텐션 리포트", go:"불러오기", cr:"알림 요청", topic:"주제", msg:"내용", mid:"회원번호(선택)", addins:"강사 추가", name:"표시 이름", run:"급여 계산", del:"삭제", save:"저장", createClass:"수업 생성", className:"수업명", when:"일시(ISO)", cap:"정원", status:"상태", markSent:"전송 완료", markFail:"실패 처리", markPending:"대기 처리", trend:"매출 추이", recent:"최근", months:"개월", err:"요청 실패", ok:"저장됨", growth:"회원 성장", retention:"유지율", util:"수업 충원율", avgFill:"평균 충원율" }
    };
    let lang = localStorage.getItem("fitlio_lang")||"ko";
    function t(k){ return S[lang][k]||k; }
    function applyNav(){ document.querySelectorAll("nav [data-i18n]").forEach(b=>{ if(b.id!=="out") b.textContent=t(b.getAttribute("data-i18n")); }); document.getElementById("out").textContent=t("out"); document.getElementById("ko").classList.toggle("on",lang==="ko"); document.getElementById("en").classList.toggle("on",lang==="en"); }
    document.getElementById("ko").onclick=()=>{lang="ko";localStorage.setItem("fitlio_lang",lang);applyNav(); render(currentTab);};
    document.getElementById("en").onclick=()=>{lang="en";localStorage.setItem("fitlio_lang",lang);applyNav(); render(currentTab);};
    document.getElementById("out").onclick=()=>{localStorage.clear();location.href="/admin-login";};
    let currentTab="dash";
    document.querySelectorAll("nav [data-tab]").forEach(b=>{
      b.onclick=()=>{ document.querySelectorAll("nav [data-tab]").forEach(x=>x.classList.remove("on")); b.classList.add("on"); currentTab=b.dataset.tab; render(currentTab); };
    });
    async function api(path, opt={}){
      const r=await fetch(path,{...opt,headers:{...H,...opt.headers||{}}});
      if(r.status===401||r.status===403){ localStorage.clear(); location.href="/admin-login"; return null;}
      return r;
    }
    async function apiJson(path, opt={}){
      const r=await api(path,opt);
      if(!r) throw new Error("unauthorized");
      const data = await r.json().catch(()=>({}));
      if(!r.ok){
        const d = data && data.detail;
        throw new Error(typeof d === "string" ? d : t("err"));
      }
      return data;
    }
    function flash(text, ok){
      const el = document.getElementById("flash");
      if(!el) return;
      el.textContent = text || "";
      el.classList.toggle("ok", !!ok);
    }
    function runKpiCountUp(root){
      if(window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches) return;
      const scope = root || document;
      scope.querySelectorAll(".kpi b").forEach((el)=>{
        const raw = (el.textContent||"").trim();
        const m = raw.match(/^([^0-9\-]*)(-?\d[\d,]*(?:\.\d+)?)(.*)$/);
        if(!m) return;
        const prefix = m[1] || "";
        const numRaw = m[2] || "";
        const suffix = m[3] || "";
        const target = Number(numRaw.replace(/,/g,""));
        if(Number.isNaN(target)) return;
        const decimals = (numRaw.split(".")[1]||"").length;
        const fmt = new Intl.NumberFormat("en-US",{minimumFractionDigits:decimals,maximumFractionDigits:decimals});
        const started = performance.now();
        const duration = 720;
        function tick(now){
          const p = Math.min(1, (now - started) / duration);
          const eased = 1 - Math.pow(1 - p, 3);
          const value = target * eased;
          el.textContent = `${prefix}${fmt.format(value)}${suffix}`;
          if(p < 1) requestAnimationFrame(tick);
        }
        el.textContent = `${prefix}${fmt.format(0)}${suffix}`;
        requestAnimationFrame(tick);
      });
    }
    async function render(tab){
      applyNav();
      const p=document.getElementById("panel"); p.innerHTML='<div id="flash" class="flash"></div>';
      const title=document.getElementById("title");
      if(tab==="dash"){
        title.textContent=t("dash");
        try{
          const stats = await apiJson("/admin/stats");
          const trend = await apiJson("/admin/sales/trend?months=6");
          const maxAmt = Math.max(...trend.points.map(x=>x.total_amount), 1);
          p.innerHTML=`<div id="flash" class="flash"></div>
            <div class="stats">
              <div class="kpi">Members<b>${stats.total_members}</b></div>
              <div class="kpi">Active passes<b>${stats.active_memberships}</b></div>
              <div class="kpi">Today check-ins<b>${stats.today_attendance}</b></div>
              <div class="kpi">Upcoming 7d classes<b>${stats.upcoming_7d_classes}</b></div>
              <div class="kpi">Pending notifications<b>${stats.pending_notifications}</b></div>
              <div class="kpi">Total classes<b>${stats.total_classes}</b></div>
            </div>
            <div class="box"><div class="hint">${t("trend")} · ${t("recent")} 6 ${t("months")}</div>
            <div class="bar-wrap">${trend.points.map(x=>`<div class="bar-row"><span>${x.label}</span><div class="bar"><i style="width:${Math.max(4, (x.total_amount/maxAmt)*100)}%"></i></div><span>$${x.total_amount.toLocaleString()}</span></div>`).join("")}</div></div>`;
          runKpiCountUp(p);
        } catch(e){ flash(e.message || t("err")); }
        return;
      }
      if(tab==="sales"){ title.textContent=t("sales"); const now=new Date();
        p.innerHTML+=`<div class="row"><label>Year</label><input id="sy" type="number" value="${now.getFullYear()}"><label>Month</label><input id="sm" type="number" min="1" max="12" value="${now.getMonth()+1}"><button class="btn" id="sg">${t("go")}</button></div><div id="sx"></div><div class="row"><label>${t("recent")}</label><input id="tm" type="number" min="1" max="24" value="12"><button class="btn" id="tg">${t("trend")}</button></div><div id="tx"></div>`;
        document.getElementById("sg").onclick=async()=>{ try{ const data=await apiJson("/admin/sales?year="+document.getElementById("sy").value+"&month="+document.getElementById("sm").value); document.getElementById("sx").innerHTML="<pre>"+JSON.stringify(data,null,2)+"</pre>"; flash(""); }catch(e){ flash(e.message||t("err")); } };
        document.getElementById("tg").onclick=async()=>{ try{ const months=+document.getElementById("tm").value||12; const data=await apiJson("/admin/sales/trend?months="+months); const maxAmt=Math.max(...data.points.map(x=>x.total_amount),1); document.getElementById("tx").innerHTML=`<div class="box"><div class="bar-wrap">${data.points.map(x=>`<div class="bar-row"><span>${x.label}</span><div class="bar"><i style="width:${Math.max(4,(x.total_amount/maxAmt)*100)}%"></i></div><span>$${x.total_amount.toLocaleString()}</span></div>`).join("")}</div></div>`; flash(""); }catch(e){ flash(e.message||t("err")); } };
        return;}
      if(tab==="pay"){ title.textContent=t("pay"); let j=[]; try{ j=await apiJson("/admin/payments"); }catch(e){ flash(e.message||t("err")); return; }
        p.innerHTML=`<table class="table"><thead><tr><th>ID</th><th>Member</th><th>Amount</th><th>${t("status")}</th><th>At</th></tr></thead><tbody>${j.map(x=>`<tr><td>${x.id}</td><td>${x.member_id}</td><td>${x.amount} ${x.currency}</td><td><span class="chip">${x.status}</span></td><td>${new Date(x.created_at).toLocaleString()}</td></tr>`).join("")}</tbody></table>`; return;}
      if(tab==="mem"){ title.textContent=t("mem"); let j=[]; try{ j=await apiJson("/admin/members"); }catch(e){ flash(e.message||t("err")); return; }
        p.innerHTML=`<div id="flash" class="flash"></div>
        <table class="table"><thead><tr><th>ID</th><th>Member No</th><th>Name</th><th>Email</th><th>Phone</th><th>Level</th><th>Role</th><th>Active</th><th></th></tr></thead><tbody>
        ${j.map(x=>`<tr>
          <td>${x.id}</td>
          <td><input id="mno_${x.id}" value="${esc(x.member_no||"")}"></td>
          <td><input id="mnm_${x.id}" value="${esc(x.full_name)}"></td>
          <td>${esc(x.email)}</td>
          <td><input id="mph_${x.id}" value="${esc(x.phone||"")}"></td>
          <td>
            <select id="mlv_${x.id}">
              <option value="starter" ${x.member_level==="starter"?"selected":""}>STARTER</option>
              <option value="core" ${x.member_level==="core"?"selected":""}>CORE</option>
              <option value="elite" ${x.member_level==="elite"?"selected":""}>ELITE</option>
              <option value="vip" ${x.member_level==="vip"?"selected":""}>VIP</option>
            </select>
          </td>
          <td>
            <select id="mrl_${x.id}">
              <option value="member" ${x.role==="member"?"selected":""}>member</option>
              <option value="admin" ${x.role==="admin"?"selected":""}>admin</option>
            </select>
          </td>
          <td><input id="mac_${x.id}" type="checkbox" ${x.is_active ? "checked" : ""}></td>
          <td><button class="btn" data-msave="${x.id}">${t("save")}</button></td>
        </tr>`).join("")}</tbody></table>`;
        p.querySelectorAll("[data-msave]").forEach(b=>b.onclick=async()=>{ 
          try{
            const id=b.dataset.msave;
            const body={
              member_no:val("mno_"+id),
              full_name:val("mnm_"+id),
              phone:val("mph_"+id),
              member_level:val("mlv_"+id),
              role:val("mrl_"+id),
              is_active:document.getElementById("mac_"+id).checked
            };
            await apiJson("/admin/members/"+id,{method:"PUT",headers:{"Content-Type":"application/json"},body:JSON.stringify(body)});
            flash(t("ok"),true);
          }catch(e){ flash(e.message||t("err")); }
        });
        return;}
      if(tab==="cls"){ title.textContent=t("cls"); let j=[]; let instructors=[]; try{ [j,instructors]=await Promise.all([apiJson("/admin/classes"),apiJson("/admin/instructors")]); }catch(e){ flash(e.message||t("err")); return; }
        const opts = instructors.map(i=>`<option value="${esc(i.display_name)}">${esc(i.display_name)}</option>`).join("");
        p.innerHTML=`<div id="flash" class="flash"></div><div class="row"><input id="cn" placeholder="${t("className")}"><input list="insList" id="ci" placeholder="${t("name")}"><datalist id="insList">${opts}</datalist><input id="cs" type="datetime-local" placeholder="${t("when")}"><input id="cc" type="number" min="1" value="20" placeholder="${t("cap")}"><button class="btn" id="cadd">${t("createClass")}</button></div>
        <table class="table"><thead><tr><th>ID</th><th>${t("className")}</th><th>${t("name")}</th><th>${t("when")}</th><th>${t("cap")}</th><th></th></tr></thead><tbody>
        ${j.map(x=>`<tr><td>${x.id}</td><td><input id="cn_${x.id}" value="${esc(x.name)}"></td><td><input id="ci_${x.id}" value="${esc(x.instructor)}"></td><td><input id="cs_${x.id}" value="${new Date(x.schedule).toISOString().slice(0,16)}"></td><td><input id="cc_${x.id}" type="number" min="1" value="${x.capacity}"></td><td><button class="btn" data-csave="${x.id}">${t("save")}</button> <button class="btn btnWarn" data-cdel="${x.id}">${t("del")}</button></td></tr>`).join("")}
        </tbody></table>`;
        document.getElementById("cadd").onclick=async()=>{ try{ const body={name:val("cn"),instructor:val("ci"),schedule:new Date(val("cs")).toISOString(),capacity:+val("cc")||20}; await apiJson("/admin/classes",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(body)}); flash(t("ok"),true); render("cls"); }catch(e){ flash(e.message||t("err")); } };
        p.querySelectorAll("[data-csave]").forEach(b=>b.onclick=async()=>{ try{ const id=b.dataset.csave; const body={name:val("cn_"+id),instructor:val("ci_"+id),schedule:new Date(val("cs_"+id)).toISOString(),capacity:+val("cc_"+id)||20}; await apiJson("/admin/classes/"+id,{method:"PUT",headers:{"Content-Type":"application/json"},body:JSON.stringify(body)}); flash(t("ok"),true); render("cls"); }catch(e){ flash(e.message||t("err")); } });
        p.querySelectorAll("[data-cdel]").forEach(b=>b.onclick=async()=>{ const id=b.dataset.cdel; if(!confirm("Delete class #"+id+"?")) return; try{ await apiJson("/admin/classes/"+id,{method:"DELETE"}); flash(t("ok"),true); render("cls"); }catch(e){ flash(e.message||t("err")); } });
        return;}
      if(tab==="ins"){ title.textContent=t("ins"); let j=[]; try{ j=await apiJson("/admin/instructors"); }catch(e){ flash(e.message||t("err")); return; }
        p.innerHTML=`<div id="flash" class="flash"></div><table class="table"><thead><tr><th>ID</th><th>${t("name")}</th><th>hourly</th><th>per class</th><th>email</th><th></th></tr></thead><tbody>
        ${j.map(x=>`<tr><td>${x.id}</td><td><input id="inm_${x.id}" value="${esc(x.display_name)}"></td><td><input id="ih_${x.id}" type="number" value="${x.hourly_rate_cents}"></td><td><input id="ip_${x.id}" type="number" value="${x.pay_per_class_cents}"></td><td><input id="ie_${x.id}" value="${esc(x.email||"")}"></td><td><button class="btn" data-isave="${x.id}">${t("save")}</button> <button class="btn btnWarn" data-idel="${x.id}">${t("del")}</button></td></tr>`).join("")}
        </tbody></table><h2 style="margin:1rem 0 .5rem;font-size:1rem">${t("addins")}</h2><div class="row"><input id="inm" placeholder="${t("name")}"><input id="ih" type="number" placeholder="hourly cents" value="120000"><input id="ip" type="number" placeholder="per class cents" value="180000"><button class="btn" id="iad">OK</button></div>`;
        document.getElementById("iad").onclick=async()=>{ try{ const body={display_name:document.getElementById("inm").value.trim(),hourly_rate_cents:+document.getElementById("ih").value,pay_per_class_cents:+document.getElementById("ip").value}; await apiJson("/admin/instructors",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(body)}); flash(t("ok"),true); render("ins"); }catch(e){ flash(e.message||t("err")); } };
        p.querySelectorAll("[data-isave]").forEach(b=>b.onclick=async()=>{ try{ const id=b.dataset.isave; const body={display_name:val("inm_"+id),hourly_rate_cents:+val("ih_"+id),pay_per_class_cents:+val("ip_"+id),email:val("ie_"+id)}; await apiJson("/admin/instructors/"+id,{method:"PUT",headers:{"Content-Type":"application/json"},body:JSON.stringify(body)}); flash(t("ok"),true); render("ins"); }catch(e){ flash(e.message||t("err")); } });
        p.querySelectorAll("[data-idel]").forEach(b=>b.onclick=async()=>{ const id=b.dataset.idel; if(!confirm("Delete instructor #"+id+"?")) return; try{ await apiJson("/admin/instructors/"+id,{method:"DELETE"}); flash(t("ok"),true); render("ins"); }catch(e){ flash(e.message||t("err")); } });
        return;}
      if(tab==="sal"){ title.textContent=t("sal"); let instructors=[]; try{ instructors=await apiJson("/admin/instructors"); }catch(e){ flash(e.message||t("err")); return; } let opts="<option value=''>—</option>"; instructors.forEach(i=>{ opts+=`<option value="${i.id}">${i.display_name}</option>`; });
        const now=new Date();
        p.innerHTML=`<div id="flash" class="flash"></div><div class="row"><select id="sid">${opts}</select><input id="py" type="number" value="${now.getFullYear()}"><input id="pm" type="number" min="1" max="12" value="${now.getMonth()+1}"><button class="btn" id="sr">${t("run")}</button></div><div id="so"></div>`;
        document.getElementById("sr").onclick=async()=>{ const id=document.getElementById("sid").value; if(!id)return; try{ const data=await apiJson("/admin/instructors/"+id+"/payroll?year="+document.getElementById("py").value+"&month="+document.getElementById("pm").value); document.getElementById("so").innerHTML="<pre>"+JSON.stringify(data,null,2)+"</pre>"; flash(""); }catch(e){ flash(e.message||t("err")); } }; return;}
      if(tab==="not"){ title.textContent=t("not");
        const fStatus=(window.__fitlioNotStatus||"").trim();
        const fChannel=(window.__fitlioNotChannel||"").trim();
        const q = new URLSearchParams();
        if(fStatus) q.set("status",fStatus);
        if(fChannel) q.set("channel",fChannel);
        let list=[],summary=null; try{ [list,summary]=await Promise.all([apiJson("/admin/notifications"+(q.toString()?`?${q.toString()}`:"")),apiJson("/admin/notifications/summary")]); }catch(e){ flash(e.message||t("err")); return; }
        p.innerHTML=`<div id="flash" class="flash"></div><div class="stats" style="margin-bottom:.7rem"><div class="kpi">Queued<b>${summary.queued}</b></div><div class="kpi">Sent<b>${summary.sent}</b></div><div class="kpi">Failed<b>${summary.failed}</b></div><div class="kpi">Retrying<b>${summary.retrying}</b></div><div class="kpi">Email<b>${summary.by_channel.email}</b></div><div class="kpi">SMS<b>${summary.by_channel.sms}</b></div><div class="kpi">In-app<b>${summary.by_channel.inapp}</b></div></div><div class="row"><button class="btn" id="runReminders">Run expiry reminders</button><button class="btn btn2" id="runDispatch">Dispatch pending notifications</button><select id="fltStatus"><option value="">all status</option><option value="pending" ${fStatus==="pending"?"selected":""}>pending</option><option value="sent" ${fStatus==="sent"?"selected":""}>sent</option><option value="failed" ${fStatus==="failed"?"selected":""}>failed</option></select><select id="fltChannel"><option value="">all channel</option><option value="email" ${fChannel==="email"?"selected":""}>email</option><option value="sms" ${fChannel==="sms"?"selected":""}>sms</option><option value="inapp" ${fChannel==="inapp"?"selected":""}>inapp</option></select><button class="btn btn2" id="fltApply">Apply</button></div><table class="table"><thead><tr><th>ID</th><th>${t("topic")}</th><th>${t("status")}</th><th>Meta</th><th></th></tr></thead><tbody>${list.map(x=>`<tr><td>${x.id}</td><td>${esc(x.topic)}<div style="font-size:.75rem;color:#6b7a70">${esc(x.message)}</div></td><td><span class="chip">${x.status}</span></td><td><div style="font-size:.75rem;color:#6b7a70">channel:${esc(x.channel||"email")} · retry:${x.retry_count||0}/${x.max_retries||3}</div>${x.last_error?`<div style="font-size:.72rem;color:#9f1239">${esc(x.last_error)}</div>`:""}</td><td><button class="btn" data-ns="${x.id}:sent">${t("markSent")}</button> <button class="btn btnWarn" data-ns="${x.id}:failed">${t("markFail")}</button> <button class="btn" data-ns="${x.id}:pending">${t("markPending")}</button> ${x.status==="failed"?`<button class="btn btn2" data-nretry="${x.id}">Retry</button>`:""} <button class="btn btn2" data-nlog="${x.id}">Attempts</button></td></tr>`).join("")}</tbody></table><div id="nAttemptBox" class="box" style="display:none;margin:.6rem 0"></div><h2 style="margin:1rem 0 .5rem;font-size:1rem">${t("cr")}</h2><div class="row"><input id="nt" placeholder="${t("topic")}"><input id="nm" placeholder="${t("mid")}"><select id="nch"><option value="email">email</option><option value="sms">sms</option><option value="inapp">inapp</option></select></div><textarea id="nx" style="width:100%;min-height:70px;margin:.5rem 0" placeholder="${t("msg")}"></textarea><button class="btn" id="nc">OK</button>`;
        runKpiCountUp(p);
        document.getElementById("runReminders").onclick=async()=>{ try{ const res=await apiJson("/admin/notifications/membership-reminders/run",{method:"POST"}); flash(`queued: +${res.created}, skipped:${res.skipped}`,true); render("not"); }catch(e){ flash(e.message||t("err")); } };
        document.getElementById("runDispatch").onclick=async()=>{ try{ const res=await apiJson("/admin/notifications/dispatch/run",{method:"POST"}); flash(`processed:${res.processed}, sent:${res.sent}, failed:${res.failed}, retry:${res.queued_retry||0}`,true); render("not"); }catch(e){ flash(e.message||t("err")); } };
        document.getElementById("fltApply").onclick=()=>{ window.__fitlioNotStatus=val("fltStatus"); window.__fitlioNotChannel=val("fltChannel"); render("not"); };
        document.getElementById("nc").onclick=async()=>{ const mid=document.getElementById("nm").value.trim(); const body={topic:document.getElementById("nt").value.trim(),message:document.getElementById("nx").value.trim(),member_id: mid?+mid:null,channel:document.getElementById("nch").value};
          try{ await apiJson("/admin/notifications",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(body)}); flash(t("ok"),true); render("not"); }catch(e){ flash(e.message||t("err")); } };
        p.querySelectorAll("[data-ns]").forEach(b=>b.onclick=async()=>{ const [id,st]=b.dataset.ns.split(":"); try{ await apiJson("/admin/notifications/"+id+"/status",{method:"PATCH",headers:{"Content-Type":"application/json"},body:JSON.stringify({status:st})}); flash(t("ok"),true); render("not"); }catch(e){ flash(e.message||t("err")); } });
        p.querySelectorAll("[data-nretry]").forEach(b=>b.onclick=async()=>{ const id=b.dataset.nretry; try{ await apiJson("/admin/notifications/"+id+"/retry",{method:"POST"}); flash("retry queued",true); render("not"); }catch(e){ flash(e.message||t("err")); } });
        p.querySelectorAll("[data-nlog]").forEach(b=>b.onclick=async()=>{ const id=b.dataset.nlog; try{ const rows=await apiJson("/admin/notifications/"+id+"/attempts"); const box=document.getElementById("nAttemptBox"); box.style.display="block"; box.innerHTML=rows.length?rows.map(r=>`<div style="margin-bottom:.35rem;font-size:.78rem"><b>${new Date(r.attempted_at).toLocaleString()}</b> · ${esc(r.channel)} · ${esc(r.status)} ${r.provider_message_id?`· ${esc(r.provider_message_id)}`:""} ${r.error_message?`· <span style='color:#9f1239'>${esc(r.error_message)}</span>`:""}</div>`).join(""):"No attempts."; }catch(e){ flash(e.message||t("err")); } });
        return;
      }
      if(tab==="rep"){
        title.textContent=t("rep");
        try{
          const [growth, retention, util] = await Promise.all([
            apiJson("/admin/reports/member-growth?months=12"),
            apiJson("/admin/reports/retention?months=12"),
            apiJson("/admin/reports/class-utilization?days=30"),
          ]);
          const maxGrowth = Math.max(...growth.points.map(x=>x.new_members), 1);
          const maxRetention = Math.max(...retention.points.map(x=>x.retention_rate), 1);
          p.innerHTML=`<div id="flash" class="flash"></div>
            <div class="stats">
              <div class="kpi">${t("avgFill")}<b>${util.average_fill_rate}%</b></div>
              <div class="kpi">${t("growth")} (12m)<b>${growth.points.reduce((a,b)=>a+b.new_members,0)}</b></div>
              <div class="kpi">${t("retention")} (latest)<b>${(retention.points[retention.points.length-1]?.retention_rate ?? 0)}%</b></div>
            </div>
            <div class="box" style="margin-bottom:.8rem">
              <div class="hint">${t("growth")}</div>
              <div class="bar-wrap">${growth.points.map(x=>`<div class="bar-row"><span>${x.label}</span><div class="bar"><i style="width:${Math.max(4,(x.new_members/maxGrowth)*100)}%"></i></div><span>${x.new_members}</span></div>`).join("")}</div>
            </div>
            <div class="box" style="margin-bottom:.8rem">
              <div class="hint">${t("retention")}</div>
              <div class="bar-wrap">${retention.points.map(x=>`<div class="bar-row"><span>${x.label}</span><div class="bar"><i style="width:${Math.max(4,(x.retention_rate/maxRetention)*100)}%"></i></div><span>${x.retention_rate}%</span></div>`).join("")}</div>
            </div>
            <table class="table"><thead><tr><th>ID</th><th>${t("className")}</th><th>${t("name")}</th><th>${t("status")}</th><th>${t("avgFill")}</th></tr></thead><tbody>
              ${util.rows.slice(0,25).map(r=>`<tr><td>${r.class_id}</td><td>${esc(r.name)}</td><td>${esc(r.instructor)}</td><td>${new Date(r.schedule).toLocaleString()}</td><td>${r.fill_rate}%</td></tr>`).join("")}
            </tbody></table>`;
          runKpiCountUp(p);
        }catch(e){
          flash(e.message||t("err"));
        }
      }
      if(tab==="msg"){
        title.textContent=t("t9");
        let members=[]; try{ members=await apiJson("/messages/admin/members"); }catch(e){ flash(e.message||t("err")); return; }
        const targets = members.filter(x=>x.role!=="admin");
        p.innerHTML=`<div id="flash" class="flash"></div>
        <div class="row"><select id="msgMember">${targets.map(m=>`<option value="${m.id}">${esc(m.full_name)} (${esc(m.member_no||("M-"+m.id))})</option>`).join("")}</select><button class="btn" id="msgLoad">${t("go")}</button></div>
        <div id="msgThread" class="box" style="min-height:220px;max-height:340px;margin-bottom:.6rem">—</div>
        <div class="row"><textarea id="msgInput" style="flex:1;min-height:70px" placeholder="${t("msg")}"></textarea><button class="btn" id="msgSend">Send</button></div>`;
        async function loadThread(){
          const mid=val("msgMember");
          if(!mid) return;
          try{
            const rows = await apiJson("/messages/thread/"+mid+"?limit=120");
            document.getElementById("msgThread").innerHTML = rows.length ? rows.map(m=>`<div style="margin-bottom:.5rem;padding:.45rem;border:1px solid #d1d9d0;border-radius:8px;background:${m.sender_id===Number(mid)?'#f6f3ea':'#e7f3ea'}"><div style="font-size:.72rem;color:#6b7a70">${new Date(m.created_at).toLocaleString()} · ${m.sender_id===Number(mid)?'member':'admin'}</div><div>${esc(m.content)}</div></div>`).join("") : "No messages yet.";
            flash("");
          }catch(e){ flash(e.message||t("err")); }
        }
        document.getElementById("msgLoad").onclick=loadThread;
        document.getElementById("msgSend").onclick=async()=>{
          const mid=val("msgMember"), text=val("msgInput");
          if(!mid || !text) return;
          try{
            await apiJson("/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({recipient_id:+mid,content:text})});
            document.getElementById("msgInput").value="";
            flash(t("ok"),true);
            loadThread();
          }catch(e){ flash(e.message||t("err")); }
        };
        loadThread();
        return;
      }
    }
    function esc(s){ const d=document.createElement("div"); d.textContent=(s==null?"":String(s)); return d.innerHTML; }
    function val(id){ const el=document.getElementById(id); return el ? el.value.trim() : ""; }
    document.addEventListener("pointerdown",(e)=>{
      const b = e.target.closest(".btn");
      if(!b) return;
      b.classList.add("is-press");
      setTimeout(()=>b.classList.remove("is-press"),140);
    });
    applyNav(); render("dash");
  </script>
</body>
</html>
